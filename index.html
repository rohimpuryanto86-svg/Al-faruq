function showLoading(msg) { document.getElementById("appRoot").innerHTML = `<div style="text-align:center; padding:80px 20px; color:white;"><div style="font-size:3rem;">⏳</div><p>${msg || "Memuat..."}</p></div>`; }
function formatRupiah(amount) { return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(amount); }
function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>'"]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; if (m === '"') return '&quot;'; if (m === "'") return '&#39;'; return m; }); }
function getDiscountedPrice(price) { if (settings.earlyBirdEnabled && new Date() < new Date(settings.earlyBirdEndDate)) { return Math.round(price * (1 - settings.earlyBirdDiscount / 100)); } return price; }

// ======================== SUPABASE INIT ========================
async function initSupabase() {
    try {
        supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        await loadBadges();
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) { currentUser = session.user; await loadUserProfile(); await checkAdminStatus(); }
        await loadCourses();
        await loadAppSettings();
        return true;
    } catch(e) {
        console.error(e);
        document.getElementById("appRoot").innerHTML = `<div class="card"><h2>❌ Gagal terhubung ke server</h2><p>${e.message}</p><button onclick="location.reload()">Coba Lagi</button></div>`;
        return false;
    }
}

async function loadAppSettings() {
    const { data } = await supabaseClient.from('app_settings').select('key, value');
    if (data) {
        appSettings = {};
        data.forEach(s => {
            appSettings[s.key] = s.value;
            if (s.key === 'early_bird_enabled') settings.earlyBirdEnabled = s.value === 'true';
            if (s.key === 'early_bird_discount') settings.earlyBirdDiscount = parseInt(s.value);
            if (s.key === 'early_bird_end_date') settings.earlyBirdEndDate = s.value;
            if (s.key === 'default_whatsapp_number') settings.defaultWhatsappNumber = s.value;
        });
    }
}

async function loadBadges() {
    const { data } = await supabaseClient.from('badges').select('*');

        { id: 4, name: "Master", icon: "👑", requirement: "Menyelesaikan semua kursus" }
    ];
}

async function loadUserProfile() {
    if (!currentUser) return;
    const { data } = await supabaseClient.from('profiles').select('*').eq('user_id', currentUser.id).single();
    if (data) {
        currentUser.profile = data;
        currentUser.name = data.full_name;
        currentUser.status = data.status || 'pending';
        currentUser.walletBalance = data.wallet_balance || 0;
        currentUser.referralCode = data.referral_code;
        currentUser.canRefer = data.can_refer || false;
        currentUser.phone = data.phone;
        currentUser.purchasedCourses = data.purchased_courses || [];
        currentUser.isBundle = data.is_bundle || false;
        currentUser.commission = data.commission || 0;
        currentUser.earnedBadges = data.earned_badges || [];
        currentUser.completedLessons = {};
        const { data: progressData } = await supabaseClient.from('user_progress').select('*').eq('user_id', currentUser.id);
        if (progressData) progressData.forEach(p => { currentUser.completedLessons[p.course_id] = p.completed_lessons || []; });
        const { data: scoresData } = await supabaseClient.from('scores').select('*').eq('user_id', currentUser.id);
        currentUser.scores = scoresData || [];
    }
}

async function checkAdminStatus() {
    const { data } = await supabaseClient.from('user_roles').select('is_admin').eq('user_id', currentUser.id).single();
    isAdmin = data?.is_admin === true;
    return isAdmin;
}

async function loadCourses() {
    const { data } = await supabaseClient.from('courses').select('*').order('id');
    if (data && data.length > 0) {
        coursesData = data.map(c => ({ ...c, lessons: c.lessons || [], price: c.price || 200000, telegram_group: c.telegram_group || '' }));
    } else {
        coursesData = [
            { id: 1, title: "Baca Al-Qur'an", icon: "📖", description: "Metode tahsin sederhana, praktik dari juz 30", price: 200000, telegram_group: "", lessons: [] },
            { id: 2, title: "Baca Kitab Gundul", icon: "📚", description: "Kenali huruf hijaiyah, pola nahwu-sharaf dasar", price: 200000, telegram_group: "", lessons: [] },
            { id: 3, title: "Bahasa Arab Umroh", icon: "🕋", description: "300+ kosakata, simulasi dialog", price: 200000, telegram_group: "", lessons: [] },

        ];
        for (const c of coursesData) await supabaseClient.from('courses').upsert(c);
    }
    return coursesData;
}

async function saveCourseToDB(course) {
    try {
        const courseData = {
            id: course.id,
            title: course.title || "Untitled Course",
            icon: course.icon || "📚",
            description: course.description || course.desc || "",
            price: parseInt(course.price) || 200000,
            lessons: course.lessons || [],
            telegram_group: course.telegram_group || course.telegramGroup || "",
            is_active: course.is_active !== undefined ? course.is_active : true
        };
        
        const { error } = await supabaseClient
            .from('courses')
            .upsert(courseData, { onConflict: 'id' });  // ← Ganti 'error' jadi 'id'
        
        if (error) throw error;
        await loadCourses();
        return true;
        
    } catch (error) {
        console.error("Save course error:", error);
        alert("Gagal menyimpan kursus: " + error.message);
        return false;
    }
}

function isCourseOwned(courseId) {
    if (isAdmin) return true;
    if (currentUser?.isBundle) return true;
    if (currentUser?.purchasedCourses?.includes(courseId)) return true;
    return false;
}

async function purchaseCourse(courseId, price, promo = null) {
    if (currentUser.walletBalance < price) {
        alert(`Saldo tidak cukup! Saldo: ${formatRupiah(currentUser.walletBalance)}`);
        return false;
    }
    
    const course = coursesData.find(c => c.id === courseId);
    let promoText = promo ? ` (dengan diskon ${promo.discount}%)` : '';
    if (!confirm(`Beli ${course?.title} seharga ${formatRupiah(price)}${promoText}?`)) return false;
    
    const newBalance = currentUser.walletBalance - price;
    const newPurchased = [...(currentUser.purchasedCourses || []), courseId];
    
    // Update saldo user
    const { error: updateError } = await supabaseClient
        .from('profiles')
        .update({ 
            wallet_balance: newBalance, 
            purchased_courses: newPurchased,
            total_spent: (currentUser.total_spent || 0) + price,
            last_purchase_at: new Date().toISOString()

        .eq('user_id', currentUser.id);
    
    if (updateError) {
        alert("Gagal membeli kursus: " + updateError.message);
        return false;
    }
    
    // Catat transaksi
    await supabaseClient.from('sales_transactions').insert({
        user_id: currentUser.id,
        user_name: currentUser.name,
        course_id: courseId,
        course_title: course.title,
        amount: price,
        final_amount: price,
        promo_code: promo?.code || null,
        promo_discount: promo?.discount || null,
        created_at: new Date().toISOString()

        const { data: promoData } = await supabaseClient
            .from('promo_codes')
            .select('used_count')
            .eq('id', promo.id)

            .from('promo_codes')
            .update({ used_count: (promoData?.used_count || 0) + 1 })
            .eq('id', promo.id);

    currentUser.walletBalance = newBalance;
    currentUser.purchasedCourses = newPurchased;
    
    alert(`✅ Berhasil membeli ${course?.title}! Saldo: ${formatRupiah(newBalance)}`);
    return true;
}

            wallet_balance: newBalance,

async function uploadToImgBBViaEdge(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = async () => {
            const base64 = reader.result.split(",")[1];
            try {
                const result = await callPPOBEdgeFunction("upload", { image: base64 });
                resolve(result.url);
            } catch (err) { reject(err); }
        };
        reader.onerror = () => reject(new Error("Gagal membaca file"));
        reader.readAsDataURL(file);
    });
}

async function checkAndUpdateReferralStatus() {
    let canRefer = false;
    const { data: allScores } = await supabaseClient
        .from('scores').select('*').eq('user_id', currentUser.id);
    currentUser.scores = allScores || [];
    for (const course of coursesData) {
        if (isCourseOwned(course.id)) {
            let completed = currentUser.completedLessons[course.id] || [];
            let totalLessons = (course.lessons || []).length;
            if (completed.length === totalLessons && totalLessons > 0) {
                let courseScores = currentUser.scores.filter(s => s.course_id === course.id);
                let avgScore = courseScores.length > 0
                    ? courseScores.reduce((sum, s) => sum + (s.quiz_score || 0), 0) / courseScores.length
                    : 0;
                if (avgScore >= 70) { canRefer = true; break; }
            }
        }
    }
    if (currentUser.canRefer !== canRefer) {
        await supabaseClient.from('profiles').update({ can_refer: canRefer }).eq('user_id', currentUser.id);
        currentUser.canRefer = canRefer;
    }
    return canRefer;
}

async function checkAndAwardBadges() {
    // Always recalculate from scratch — never trust cached DB badges
    // This ensures wrongly awarded badges (e.g. Master from old bug) get corrected
    let previousEarned = currentUser.earnedBadges ? [...currentUser.earnedBadges] : [];
    let correctEarned = [];

    let totalCompleted = 0;
    let ownedCourses = coursesData.filter(c => isCourseOwned(c.id));
    let completedCourses = 0;

    for (const course of ownedCourses) {
        let completed = currentUser.completedLessons[course.id] || [];
        let totalLessons = (course.lessons || []).length;
        totalCompleted += completed.length;
        if (totalLessons > 0 && completed.length === totalLessons) completedCourses++;
    }

    // Master requires ALL owned courses completed AND must own more than 1
    let allCoursesCompleted = completedCourses === ownedCourses.length && ownedCourses.length > 1;

    for (const badge of badgesData) {
        let shouldEarn = false;
        let req = (badge.requirement || '').toLowerCase();
        let name = (badge.name || '').toLowerCase();
        if (badge.id === 1 || name === 'pemula' || req.includes('1 materi')) {
            shouldEarn = totalCompleted >= 1;
        } else if (badge.id === 2 || name === 'semangat' || req.includes('5 materi')) {
            shouldEarn = totalCompleted >= 5;
        } else if (badge.id === 3 || name === 'sarjana' || req.includes('1 kursus')) {
            shouldEarn = completedCourses >= 1;
        } else if (badge.id === 4 || name === 'master' || req.includes('semua kursus')) {
            shouldEarn = allCoursesCompleted;
        }
        if (shouldEarn) correctEarned.push(badge.id);
    }

    // Find newly earned badges (not in previous list)
    let newBadges = badgesData.filter(b => correctEarned.includes(b.id) && !previousEarned.includes(b.id));

    // Always save the corrected list back to DB (fixes wrongly awarded badges)
    if (JSON.stringify(correctEarned.sort()) !== JSON.stringify(previousEarned.sort())) {
        currentUser.earnedBadges = correctEarned;
        await supabaseClient.from('profiles').update({ earned_badges: correctEarned }).eq('user_id', currentUser.id);
    }

    if (newBadges.length > 0) {
        let badgeNames = newBadges.map(b => `${b.icon || '🏅'} ${b.name}`).join(', ');
        alert(`🎉 Selamat! Kamu mendapat badge baru: ${badgeNames}`);
    }
    return newBadges;
}

function getCourseProgress(courseId) {
    let completed = currentUser.completedLessons[courseId] || [];
    let total = coursesData.find(c => c.id === courseId)?.lessons?.length || 1;
    return { completed: completed.length, total, percent: (completed.length / total) * 100 };
}

function getOverallProgress() {
    let totalCompleted = 0, totalLessons = 0;
    coursesData.forEach(course => {
        if (isCourseOwned(course.id)) {
            let completed = currentUser.completedLessons[course.id] || [];
            totalCompleted += completed.length;
            totalLessons += (course.lessons || []).length;
        }
    });
    return { completed: totalCompleted, total: totalLessons, percent: totalLessons > 0 ? (totalCompleted / totalLessons) * 100 : 0 };
}

function copyReferral() {
    const referralCode = currentUser && currentUser.referralCode;
    if (!referralCode) {
        alert("Kode referral tidak ditemukan!");
        return;
    }
    const baseUrl = window.location.href.split('?')[0].split('#')[0];
    const referralUrl = `${baseUrl}?ref=${referralCode}`;
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(referralUrl).then(() => {
            alert(`✅ Link referral berhasil disalin!\n\n${referralUrl}`);
        }).catch(() => {
            fallbackCopy(referralUrl);
        });
    } else {
        fallbackCopy(referralUrl);
    }
}

function fallbackCopy(text) {
    const textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.style.position = 'fixed';
    textarea.style.opacity = '0';
    document.body.appendChild(textarea);
    textarea.focus();
    textarea.select();
    try {
        document.execCommand('copy');
        alert(`✅ Link referral berhasil disalin!\n\n${text}`);
    } catch(e) {
        alert(`Gagal menyalin otomatis. Salin manual:\n\n${text}`);
    }
    document.body.removeChild(textarea);
}

function getEmbedUrl(url) {
    if (!url) return null;
    url = url.trim();
    let ytMatch = url.match(/(?:youtube\.com\/(?:watch\?v=|shorts\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
    if (ytMatch) return `https://www.youtube.com/embed/${ytMatch[1]}?rel=0`;
    let driveMatch = url.match(/drive\.google\.com\/file\/d\/([^/]+)/);
    if (driveMatch) return `https://drive.google.com/file/d/${driveMatch[1]}/preview`;
    if (url.startsWith('http')) return url;
    return null;
}

    if (validQuiz.length === 0) { alert("Format quiz tidak valid. Hubungi admin."); renderLessonDetail(); return; }
    let existing = localStorage.getItem(`quiz_${currentUser.id}_${currentCourseForUser.id}_${selectedLessonIndex}`);

    document.getElementById("backToLesson").onclick = () => renderLessonDetail();
    document.getElementById("quizForm").onsubmit = async (e) => {
        e.preventDefault();

        const { error } = await supabaseClient.from('scores').upsert({ user_id: currentUser.id, course_id: currentCourseForUser.id, lesson_id: selectedLessonIndex, quiz_score: score * 10, taken_at: new Date().toISOString() }, { onConflict: 'user_id, course_id, lesson_id' });
        if (error) { console.error("Error saving score:", error); alert("Gagal menyimpan nilai!\n\nDetail: " + (error.message || error.details || JSON.stringify(error))); return; }

    document.getElementById("topUp100Btn").onclick = () => { document.getElementById("amount").value = 100000; };

    document.getElementById("topUpForm").onsubmit = async (e) => {
        e.preventDefault();
        let amount = parseInt(document.getElementById("amount").value);
        let file = document.getElementById("proof").files[0];
        if (!amount || amount < 10000) { alert("Minimal top up Rp 10.000"); return; }
        let btn = document.getElementById("submitTopUpBtn");
        let originalText = btn.innerHTML;
        btn.disabled = true; btn.innerHTML = "Memproses...";
        let proofUrl = "manual_" + Date.now();
        if (file) { try { proofUrl = await uploadToImgBBViaEdge(file); } catch(err) { console.warn("Upload error:", err); proofUrl = "upload_failed_" + Date.now(); } }
        const { error } = await supabaseClient.from('withdraw_requests').insert({ user_id: currentUser.id, amount: amount, type: "topup", proof_url: proofUrl, status: "pending" });
        btn.disabled = false; btn.innerHTML = originalText;
        if (error) { console.error("Insert error:", error); alert("❌ Gagal: " + error.message); } else { alert("✅ Request top up terkirim! Menunggu konfirmasi admin."); renderWalletPage(); }
    };
}

async function loadPPOBProducts(category) {
    const container = document.getElementById("ppobProductsContainer");
    if (!container) return;
    
    // Cek limit harian untuk e-wallet
    let todayEwalletTotal = 0;
    let ewalletLimit = 500000; // Rp 500.000 per hari
    
    if (category === "ewallet") {
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        
        const { data: todayTransactions } = await supabaseClient
            .from('ppob_transactions')
            .select('amount')
            .eq('user_id', currentUser.id)
            .eq('product_sku', 'ewallet')
            .gte('created_at', today.toISOString());
        
        if (todayTransactions && todayTransactions.length > 0) {
            todayEwalletTotal = todayTransactions.reduce((sum, t) => sum + t.amount, 0);
        }
    }
    
    const products = PPOB_PRODUCTS[category] || [];
    if (products.length === 0) {
        container.innerHTML = '<div class="alert-warning">Belum ada produk untuk kategori ini</div>';
        return;
    }
    
    let productsHtml = `<div class="course-grid">`;
    
    for (const product of products) {
        const price = getPPOBPrice(product.basePrice, product.markup);
        let isDisabled = false;
        let disabledReason = "";
        
        if (category === "ewallet") {
            const remainingLimit = ewalletLimit - todayEwalletTotal;
            if (remainingLimit < price) {
                isDisabled = true;
                disabledReason = `Sisa limit hari ini ${formatRupiah(remainingLimit)}`;
            }
        }
        
        productsHtml += `
            <div class="course-card ppob-product-card">
                <div class="course-icon">${getProductIconPPOB(category)}</div>
                <div class="course-title">${product.name}</div>
                <div class="course-price">${formatRupiah(price)}</div>
                ${category === "ewallet" ? `<div class="alert-info" style="font-size:0.7rem;">💰 Sisa limit harian: ${formatRupiah(ewalletLimit - todayEwalletTotal)}</div>` : ''}
                ${isDisabled ? `<div class="alert-warning" style="font-size:0.7rem;">⚠️ ${disabledReason}</div>` : ''}
                <button class="btn-primary select-ppob-product" 
                        data-sku="${product.sku}"
                        data-name="${product.name}"
                        data-price="${price}"
                        data-category="${category}"
                        ${isDisabled ? 'disabled' : ''}>
                    ${isDisabled ? 'Limit Habis' : 'Beli'}
                </button>
            </div>
        `;
    }
    
    productsHtml += `</div>`;
    container.innerHTML = productsHtml;
// ======================== EVENT LISTENER UNTUK TOMBOL BELI PPOB ========================
document.querySelectorAll(".select-ppob-product").forEach(btn => {
    btn.onclick = async () => {
        const sku = btn.getAttribute("data-sku");
        const name = btn.getAttribute("data-name");
        const price = parseInt(btn.getAttribute("data-price"));
        const category = btn.getAttribute("data-category");

        // CEK LIMIT UNTUK E-WALLET
        if (category === "ewallet") {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            const { data: todayTransactions } = await supabaseClient
                .from('ppob_transactions')
                .select('amount')
                .eq('user_id', currentUser.id)
                .eq('product_sku', 'ewallet')
                .gte('created_at', today.toISOString());
            
            let todayTotal = 0;
            if (todayTransactions && todayTransactions.length > 0) {
                todayTotal = todayTransactions.reduce((sum, t) => sum + t.amount, 0);
            }
            
            if (todayTotal + price > 500000) {
                alert(`⚠️ Melebihi limit harian Top Up E-Wallet (Rp 500.000/hari)!\nSisa limit hari ini: ${formatRupiah(500000 - todayTotal)}`);

async function renderCertificatePage() {
    let ownedCourses = coursesData.filter(c => isCourseOwned(c.id));
    let completedCourses = ownedCourses.filter(c => { 
        let completed = currentUser.completedLessons[c.id] || []; 
        return completed.length === (c.lessons || []).length && (c.lessons || []).length > 0; 
    });
    
    let html = `
        <div class="tabs">
            <div class="tab" id="backToDash">Kembali</div>
            <div class="tab active">Sertifikat Kelulusan</div>
        </div>
        <div class="card">
            ${completedCourses.length === 0 ? '<div class="alert-warning">Selesaikan semua materi suatu kursus untuk mendapatkan sertifikat.</div>' : ''}
            ${completedCourses.map(c => `
                <div style="border:2px solid #f4a261; border-radius:20px; padding:20px; margin-bottom:15px; text-align:center;">
                    <div style="font-size:1.5rem; font-weight:bold;">${escapeHtml(currentUser.name)}</div>
                    <div style="font-size:1.2rem; color:#e67e22;">${c.title}</div>
                    <p>Telah menyelesaikan program</p>
                    <button class="btn-success download-cert" data-title="${c.title}" data-course-id="${c.id}">Download Sertifikat PDF (A4)</button>
                </div>
            `).join('')}
        </div>
    `;
    
    document.getElementById("appRoot").innerHTML = html;
    document.getElementById("backToDash").onclick = () => renderUserDashboard();
    
    // Event download sertifikat
    document.querySelectorAll(".download-cert").forEach(btn => {
        btn.onclick = async () => {
            const courseId = parseInt(btn.getAttribute("data-course-id"));
            const course = coursesData.find(c => c.id === courseId);

            btn.disabled = true;
            btn.textContent = "Menyiapkan Sertifikat...";

            try {
                // Fetch final score from Supabase
                const { data: scores } = await supabaseClient
                    .from('scores')
                    .select('quiz_score')
                    .eq('user_id', currentUser.id)
                    .eq('course_id', course.id);

                let finalScore = 0;
                if (scores && scores.length > 0) {
                    const total = scores.reduce((sum, s) => sum + (s.quiz_score || 0), 0);
                    finalScore = Math.round(total / scores.length);
                }

                const predikat = finalScore >= 90 ? 'SANGAT MEMUASKAN'
                    : finalScore >= 75 ? 'MEMUASKAN'
                    : finalScore >= 60 ? 'CUKUP MEMUASKAN'
                    : 'LULUS';

                const certId = currentUser.id.substring(0, 8).toUpperCase() + '-' + course.id + '-' + Date.now();
                const dateStr = new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });

                // Save certificate record to DB (upsert so re-downloads keep same number)
                let certNumber = certId;
                try {
                    // Check if cert already exists for this user+course
                    const { data: existingCert } = await supabaseClient
                        .from('certificates')
                        .select('cert_number')
                        .eq('user_id', currentUser.id)
                        .eq('course_id', course.id)
                        .single();
                    if (existingCert && existingCert.cert_number) {
                        certNumber = existingCert.cert_number;
                    } else {
                        await supabaseClient.from('certificates').upsert({
                            user_id: currentUser.id,
                            user_name: currentUser.name,
                            course_id: course.id,
                            course_title: course.title,
                            cert_number: certNumber,
                            final_score: finalScore,
                            issued_at: new Date().toISOString()
                        }, { onConflict: 'user_id,course_id' });
                    }
                } catch(dbErr) { console.warn('Cert DB save:', dbErr); }

                // Generate QR code as data URL
                const qrVerifyUrl = `${window.location.origin}${window.location.pathname}?verify=${certNumber}`;
                const qrDataUrl = await new Promise((resolve, reject) => {
                    const qrDiv = document.createElement('div');
                    qrDiv.style.display = 'none';
                    document.body.appendChild(qrDiv);
                    try {
                        const qr = new QRCode(qrDiv, {
                            text: qrVerifyUrl,
                            width: 128,
                            height: 128,
                            correctLevel: QRCode.CorrectLevel.M
                        });
                        setTimeout(() => {
                            const canvas = qrDiv.querySelector('canvas');
                            const img = qrDiv.querySelector('img');
                            let dataUrl = '';
                            if (canvas) dataUrl = canvas.toDataURL('image/png');
                            else if (img) dataUrl = img.src;
                            document.body.removeChild(qrDiv);
                            resolve(dataUrl);
                        }, 300);
                    } catch(e) { document.body.removeChild(qrDiv); reject(e); }
                });

                // Build certificate using jsPDF in landscape A4
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'landscape' });

                const W = doc.internal.pageSize.getWidth();   // 297mm
                const H = doc.internal.pageSize.getHeight();  // 210mm
                const cx = W / 2;

                const green  = [30, 107, 59];
                const orange = [230, 126, 34];
                const dark   = [44, 62, 80];
                const gold   = [244, 162, 97];

                // Outer border (gold)
                doc.setDrawColor(...gold);
                doc.setLineWidth(4);
                doc.rect(8, 8, W - 16, H - 16);

                // Inner border (green thin)
                doc.setDrawColor(...green);
                doc.setLineWidth(1);
                doc.rect(12, 12, W - 24, H - 24);

                // Green header band
                doc.setFillColor(...green);
                doc.rect(12, 12, W - 24, 28, 'F');

                // Header text: ALFARUQ ONLINE COURSE
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(22);
                doc.setTextColor(255, 255, 255);
                doc.text('ALFARUQ ONLINE COURSE', cx, 24, { align: 'center' });

                doc.setFontSize(11);
                doc.setFont('helvetica', 'normal');
                doc.text('Lembaga Pendidikan Islam Terpercaya', cx, 33, { align: 'center' });

                // SERTIFIKAT title
                doc.setFontSize(36);
                doc.setFont('helvetica', 'bold');
                doc.setTextColor(...green);
                doc.text('SERTIFIKAT', cx, 62, { align: 'center' });

                doc.setFontSize(14);
                doc.setFont('helvetica', 'normal');
                doc.setTextColor(100, 100, 100);
                doc.text('KELULUSAN', cx, 72, { align: 'center' });

                // Divider line
                doc.setDrawColor(...gold);
                doc.setLineWidth(0.8);
                doc.line(40, 77, W - 40, 77);

                // "Diberikan kepada"
                doc.setFontSize(11);
                doc.setTextColor(100, 100, 100);
                doc.setFont('helvetica', 'italic');
                doc.text('Diberikan kepada', cx, 87, { align: 'center' });

                // Recipient name
                doc.setFontSize(28);
                doc.setFont('helvetica', 'bold');
                doc.setTextColor(...dark);
                doc.text(currentUser.name || '-', cx, 102, { align: 'center' });

                // Name underline
                doc.setDrawColor(...dark);
                doc.setLineWidth(0.5);
                const nameW = doc.getTextWidth(currentUser.name || '-');
                doc.line(cx - nameW/2, 105, cx + nameW/2, 105);

                // "Atas keberhasilannya menyelesaikan"
                doc.setFontSize(11);
                doc.setFont('helvetica', 'normal');
                doc.setTextColor(80, 80, 80);
                doc.text('Atas keberhasilannya menyelesaikan program kursus', cx, 115, { align: 'center' });

                // Course name
                doc.setFontSize(18);
                doc.setFont('helvetica', 'bold');
                doc.setTextColor(...orange);
                doc.text(course.title, cx, 126, { align: 'center' });

                // Predikat & score
                doc.setFontSize(12);
                doc.setFont('helvetica', 'normal');
                doc.setTextColor(80, 80, 80);
                doc.text('dengan predikat', cx, 136, { align: 'center' });

                doc.setFontSize(16);
                doc.setFont('helvetica', 'bold');
                doc.setTextColor(...green);
                doc.text(predikat, cx, 145, { align: 'center' });

                doc.setFontSize(11);
                doc.setFont('helvetica', 'normal');
                doc.setTextColor(80, 80, 80);
                doc.text('Nilai Akhir: ' + finalScore + ' / 100', cx, 153, { align: 'center' });

                // Gold divider
                doc.setDrawColor(...gold);
                doc.setLineWidth(0.8);
                doc.line(40, 158, W - 40, 158);

                // Signature blocks
                const sig1x = 70, sig2x = W - 70;
                const sigY = 185;

                // Signature lines
                doc.setDrawColor(...dark);
                doc.setLineWidth(0.5);
                doc.line(sig1x - 28, sigY - 6, sig1x + 28, sigY - 6);
                doc.line(sig2x - 28, sigY - 6, sig2x + 28, sigY - 6);

                doc.setFontSize(11);
                doc.setFont('helvetica', 'bold');
                doc.setTextColor(...dark);
                doc.text('Pengajar', sig1x, sigY, { align: 'center' });
                doc.text('Direktur', sig2x, sigY, { align: 'center' });

                // Date center
                doc.setFontSize(10);
                doc.setFont('helvetica', 'normal');
                doc.setTextColor(100, 100, 100);
                doc.text(dateStr, cx, sigY - 3, { align: 'center' });

                // QR code bottom-left
                try {
                    if (qrDataUrl && qrDataUrl.startsWith('data:')) {
                        doc.addImage(qrDataUrl, 'PNG', 16, H - 50, 32, 32);
                        doc.setFontSize(6);
                        doc.setTextColor(150, 150, 150);
                        doc.text('Scan untuk verifikasi', 32, H - 16, { align: 'center' });
                    }
                } catch(qrErr) { console.warn('QR add error:', qrErr); }

                // Certificate ID footer
                doc.setFontSize(8);
                doc.setTextColor(180, 180, 180);
                doc.text('No. Sertifikat: ' + certNumber, cx, H - 16, { align: 'center' });

                const safeName = (currentUser.name || 'Peserta').replace(/\s+/g, '_');
                const safeCourse = course.title.replace(/\s+/g, '_');
                doc.save('Sertifikat_' + safeName + '_' + safeCourse + '.pdf');

            } catch (err) {
                console.error('Certificate error:', err);
                alert('Gagal membuat sertifikat: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = "Download Sertifikat PDF (A4)";
            }
        };
    });
}

// ======================== RENDER REPORT PAGE ========================
async function renderReportPage() {
    // Fetch both quiz scores and practical scores
    const { data: scoresData } = await supabaseClient
        .from('scores')
        .select('*')
        .eq('user_id', currentUser.id);
    currentUser.scores = scoresData || [];

    const { data: practicalData } = await supabaseClient
        .from('practical_scores')
        .select('*')
        .eq('user_id', currentUser.id);
    const practicalList = practicalData || [];

    // Build merged rows per lesson
    const allRows = [];
    for (const course of coursesData) {
        const courseQuiz = currentUser.scores.filter(s => s.course_id === course.id);
        const coursePractical = practicalList.filter(s => s.course_id === course.id);
        const lessonIds = [...new Set([...courseQuiz.map(s => s.lesson_id), ...coursePractical.map(s => s.lesson_id)])];

            allRows.push({
                courseTitle: course?.title || '-',
                lessonTitle: lesson?.title || `Materi ${lessonId + 1}`,
                quizScore: quiz?.quiz_score != null ? quiz.quiz_score : '-',

async function loadWithdrawHistory() {
    const container = document.getElementById("withdrawHistory");
    if (!container) return;
    
    try {
        const { data, error } = await supabaseClient
            .from('withdraw_requests')
            .select('*')
            .eq('user_id', currentUser.id)
            .eq('type', 'withdraw')
            .order('created_at', { ascending: false });
        
        if (error) {
            console.error("Error load withdraw history:", error);
            container.innerHTML = '<div class="alert-danger">Gagal memuat riwayat</div>';
            return;
        }
        
        if (!data || data.length === 0) {
            container.innerHTML = '<div class="alert-info">Belum ada riwayat withdraw.</div>';
            return;
        }
        
        let html = `
            <table class="report-table">
                <thead>
                    <tr style="background:#1e6b3b; color:white;">
                        <th>Tanggal</th>
                        <th>Jumlah</th>
                        <th>Fee</th>
                        <th>Diterima</th>
                        <th>Metode</th>
                        <th>No. Tujuan</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
        `;
        
        for (const w of data) {
            let statusText = '';
            let statusColor = '';
            
            if (w.status === 'approved') {
                statusText = '✅ Disetujui';
                statusColor = '#27ae60';
            } else if (w.status === 'rejected') {
                statusText = '❌ Ditolak';
                statusColor = '#e74c3c';
            } else {
                statusText = '⏳ Pending';
                statusColor = '#f39c12';
            }
            
            // Parse fee and received from notes field
            let fee = 0, received = w.amount;
            if (w.notes) {
                let feeMatch = w.notes.match(/Fee:\s*([\d]+)/);
                let recMatch = w.notes.match(/Diterima:\s*([\d]+)/);
                if (feeMatch) fee = parseInt(feeMatch[1]);
                if (recMatch) received = parseInt(recMatch[1]);
            }
            
            html += `
                <tr>
                    <td>${new Date(w.created_at).toLocaleDateString('id-ID')} ${new Date(w.created_at).toLocaleTimeString('id-ID', {hour:'2-digit',minute:'2-digit'})}</td>
                    <td>${formatRupiah(w.amount)}</td>
                    <td style="color:#e74c3c;">${formatRupiah(fee)}</td>
                    <td style="color:#27ae60;font-weight:bold;">${formatRupiah(received)}</td>
                    <td>${w.bank_name ? w.bank_name.toUpperCase() : '-'}</td>
                    <td>${w.bank_account || '-'}</td>
                    <td style="color:${statusColor}; font-weight:bold;">${statusText}</td>
                </tr>
            `;
        }
        
        html += `</tbody></table>`;
        container.innerHTML = html;
        
    } catch (err) {
        console.error("Error:", err);
        container.innerHTML = '<div class="alert-danger">Error: ' + err.message + '</div>';
    }
}

    searchInput.oninput = function() {

                .or(`email.ilike.%${query}%,full_name.ilike.%${query}%`)

                .limit(5);
            
            if (error || !data || data.length === 0) {

                selectedUser = null;
                transferBtn.disabled = true;
            } else {
                let html = '<div style="border:1px solid #ddd; border-radius:8px; background:var(--bg-card);">';
                data.forEach(user => {
                    html += `<div class="user-result" data-id="${user.user_id}" data-name="${user.full_name}" data-email="${user.email}" style="padding:10px; border-bottom:1px solid #eee; cursor:pointer;">

                });

                document.querySelectorAll(".user-result").forEach(el => {

                        };
                        searchInput.value = `${selectedUser.full_name} (${selectedUser.email})`;

                    };
                });
            }
        }, 500);
    };
    
    // Validasi jumlah transfer
    transferAmount.oninput = function() {
        let amount = parseInt(this.value);
        if (!selectedUser) return;
        
        if (isNaN(amount) || amount < 5000) {
            transferBtn.disabled = true;
        } else if (amount > currentUser.walletBalance) {
            transferBtn.disabled = true;
        } else if (todayTotal + amount > dailyLimit) {
            transferBtn.disabled = true;
        } else {
            transferBtn.disabled = false;
        }
    };
    
    // Load riwayat transfer
    await loadTransferHistory();
    
    // Submit transfer
    document.getElementById("transferForm").onsubmit = async (e) => {
        e.preventDefault();
        
        let amount = parseInt(transferAmount.value);
        let note = document.getElementById("transferNote").value;
        
        if (!selectedUser) {
            alert("Pilih penerima terlebih dahulu!");
            return;
        }
        
        if (!amount || amount < 5000) {
            alert("Minimal transfer Rp 5.000");
            return;
        }
        
        if (amount > currentUser.walletBalance) {
            alert(`Saldo tidak cukup! Saldo: ${formatRupiah(currentUser.walletBalance)}`);
            return;
        }
        
        let todayTotalCheck = await getTodayTransferTotal();
        if (todayTotalCheck + amount > dailyLimit) {
            alert(`⚠️ Melebihi limit transfer harian ${formatRupiah(dailyLimit)}!`);
            return;
        }
        
        if (!confirm(`Konfirmasi transfer:\n\nKepada: ${selectedUser.full_name}\nJumlah: ${formatRupiah(amount)}\nCatatan: ${note || '-'}\n\nLanjutkan?`)) return;
        
        let btn = document.getElementById("transferBtn");
        let originalText = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = "Memproses...";
        
        // Kurangi saldo pengirim
        let newSenderBalance = currentUser.walletBalance - amount;
        let { error: senderError } = await supabaseClient
            .from('profiles')
            .update({ wallet_balance: newSenderBalance })
            .eq('user_id', currentUser.id);
        
        if (senderError) {
            alert("❌ Gagal: " + senderError.message);
            btn.disabled = false;
            btn.innerHTML = originalText;
            return;
        }
        
        // Tambah saldo penerima
        let { data: receiver } = await supabaseClient
            .from('profiles')
            .select('wallet_balance')
            .eq('user_id', selectedUser.user_id)
            .single();
        
        let newReceiverBalance = (receiver?.wallet_balance || 0) + amount;
        let { error: receiverError } = await supabaseClient
            .from('profiles')
            .update({ wallet_balance: newReceiverBalance })
            .eq('user_id', selectedUser.user_id);
        
        if (receiverError) {
            // Rollback
            await supabaseClient.from('profiles').update({ wallet_balance: currentUser.walletBalance }).eq('user_id', currentUser.id);
            alert("❌ Gagal: " + receiverError.message);
            btn.disabled = false;
            btn.innerHTML = originalText;
            return;
        }
        
        // Catat transaksi
        await supabaseClient.from('transfer_logs').insert({
            from_user_id: currentUser.id,
            from_user_name: currentUser.name,
            to_user_id: selectedUser.user_id,
            to_user_name: selectedUser.full_name,
            amount: amount,
            note: note,
            status: 'success',
            created_at: new Date().toISOString()
        });
        
        currentUser.walletBalance = newSenderBalance;
        alert(`✅ Transfer ${formatRupiah(amount)} berhasil dikirim ke ${selectedUser.full_name}!`);
        renderTransferPage();
    };
}

async function getTodayTransferTotal() {

        .from('transfer_logs')
        .select('amount')
        .eq('from_user_id', currentUser.id)
        .gte('created_at', today.toISOString());
    return (data || []).reduce((sum, t) => sum + t.amount, 0);
}

            confirmMsg += `📝 Catatan: ${request.notes || '-'}\n\n`;

        <div class="form-group"><label>📝 JSON Editor:</label><textarea id="jsonEditor" rows="15" style="width:100%; font-family:monospace; font-size:11px; background:#1e1e2e; color:#e0e0e0;"></textarea></div>
        <div style="display:flex; gap:10px;"><button id="saveJsonBtn" class="btn-success" disabled>💾 Simpan</button><button id="validateJsonBtn" class="btn-primary">✅ Validasi</button><button id="backBtn" class="btn-back">Kembali</button></div>
        <div id="jsonStatus"></div></div>`;
    document.getElementById("adminContent").innerHTML = html;
    
    const courseSelect = document.getElementById("courseSelect"), jsonEditor = document.getElementById("jsonEditor");
    const loadCourseBtn = document.getElementById("loadCourseBtn"), downloadJsonBtn = document.getElementById("downloadJsonBtn");
    const uploadJsonBtn = document.getElementById("uploadJsonBtn"), saveJsonBtn = document.getElementById("saveJsonBtn");
    const validateJsonBtn = document.getElementById("validateJsonBtn"), backBtn = document.getElementById("backBtn");
    const downloadTemplateBtn = document.getElementById("downloadTemplateBtn"), jsonFileInput = document.getElementById("jsonFileInput");
    const statusDiv = document.getElementById("jsonStatus");
    function setStatus(msg, type) { statusDiv.innerHTML = `<div class="alert-${type}">${msg}</div>`; setTimeout(() => { if(statusDiv.innerHTML.includes(msg)) statusDiv.innerHTML = ""; }, 5000); }
    
    downloadTemplateBtn.onclick = () => {
        let template = { id: null, title: "Nama Kursus Anda", icon: "📚", description: "Deskripsi kursus", price: 200000, telegram_group: "https://t.me/namagrup", lessons: [] };
        for (let i = 1; i <= 30; i++) template.lessons.push({ number: i, title: `Pertemuan ${i}: [Isi Judul Materi]`, videoUrl: "", content: "", quiz: [] });
        let blob = new Blob([JSON.stringify(template, null, 2)], { type: "application/json" });
        let a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "template_kursus_30_materi.json"; a.click(); URL.revokeObjectURL(blob);
        setStatus("✅ Template 30 materi berhasil didownload!", "success");
    };
    uploadJsonBtn.onclick = () => jsonFileInput.click();
    jsonFileInput.onchange = async (e) => {
        let file = e.target.files[0]; if (!file) return;
        let reader = new FileReader();
        reader.onload = async (ev) => {
            try { let jsonData = JSON.parse(ev.target.result); jsonEditor.value = JSON.stringify(jsonData, null, 2); setStatus(`✅ File "${file.name}" berhasil diupload!`, "success"); saveJsonBtn.disabled = false; downloadJsonBtn.disabled = false;
            if (jsonData.id) { let opt = Array.from(courseSelect.options).find(o => o.value == jsonData.id); if (opt) courseSelect.value = jsonData.id; }
            } catch (err) { setStatus(`❌ Gagal parsing JSON: ${err.message}`, "danger"); }
        }; reader.readAsText(file); jsonFileInput.value = "";
    };
    loadCourseBtn.onclick = async () => {
        let courseId = courseSelect.value; if (!courseId) { setStatus("Pilih kursus!", "warning"); return; }
        let course = coursesData.find(c => c.id == courseId);
        if (course) { jsonEditor.value = JSON.stringify(course, null, 2); downloadJsonBtn.disabled = false; saveJsonBtn.disabled = false; setStatus(`✅ Kursus "${course.title}" dimuat`, "success"); }
        else setStatus("Gagal memuat", "danger");
    };
    downloadJsonBtn.onclick = () => { try { let json = JSON.parse(jsonEditor.value); let fileName = `course_${json.id || Date.now()}.json`; let blob = new Blob([JSON.stringify(json, null, 2)], { type: "application/json" }); let a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = fileName; a.click(); URL.revokeObjectURL(blob); setStatus(`✅ File "${fileName}" didownload`, "success"); } catch(e) { setStatus(`JSON tidak valid: ${e.message}`, "danger"); } };
    validateJsonBtn.onclick = () => { try { let course = JSON.parse(jsonEditor.value); let errors = []; if (!course.title) errors.push("❌ Tidak ada 'title'"); if (!course.lessons || !Array.isArray(course.lessons)) errors.push("❌ 'lessons' harus array"); if (errors.length) setStatus(errors.join("<br>"), "danger"); else setStatus(`✅ JSON VALID! ${course.lessons?.length || 0} materi`, "success"); } catch(e) { setStatus(`❌ JSON tidak valid: ${e.message}`, "danger"); } };
    saveJsonBtn.onclick = async () => { try { let course = JSON.parse(jsonEditor.value); if (!course.id) { let maxId = Math.max(...coursesData.map(c => c.id), 0); course.id = maxId + 1; } if (!course.lessons) course.lessons = []; if (!confirm(`Simpan ${course.lessons.length} materi ke "${course.title}"?`)) return; if (await saveCourseToDB(course)) { setStatus(`✅ BERHASIL! ${course.lessons.length} materi disimpan`, "success"); await loadCourses(); location.reload(); } } catch(e) { setStatus(`❌ Gagal: ${e.message}`, "danger"); } };
    backBtn.onclick = () => renderAdminDashboard();
}

    document.getElementById("practicalForm").onsubmit = async (e) => {
        e.preventDefault();
        
        const userId = document.getElementById("practicalUserId").value;
        const courseId = parseInt(document.getElementById("practicalCourseId").value);
        const lessonId = parseInt(document.getElementById("practicalLessonId").value);
        const score = parseInt(document.getElementById("practicalScore").value);
        const notes = document.getElementById("practicalNotes").value;
        
        if (!userId || !courseId || isNaN(lessonId) || score === '' || isNaN(score)) {
            alert("Lengkapi semua data!");
            return;
        }
        
        const { error } = await supabaseClient
            .from('practical_scores')
            .upsert({
                user_id: userId,
                course_id: courseId,
                lesson_id: lessonId,
                score: score,
                notes: notes
            }, { onConflict: 'user_id,course_id,lesson_id' });
        
        if (error) {
            alert("❌ Gagal: " + error.message);
        } else {
            alert("✅ Nilai praktik berhasil disimpan!");
            await loadPracticalScoresList();
            
            // Reset form
            document.getElementById("practicalUserId").value = "";
            document.getElementById("practicalCourseId").value = "";
            document.getElementById("practicalLessonId").value = "";
            document.getElementById("practicalLessonGroup").style.display = "none";
            document.getElementById("practicalScore").value = "";
            document.getElementById("practicalNotes").value = "";
            document.getElementById("practicalScoreGroup").style.display = "none";
            document.getElementById("practicalNotesGroup").style.display = "none";
            document.getElementById("savePracticalBtn").style.display = "none";
        }
    };
}

async function loadPracticalScoresList() {
    const container = document.getElementById("practicalList");
    if (!container) return;
    
    try {
        // Ambil data nilai praktik
        const { data: scores, error } = await supabaseClient
            .from('practical_scores')
            .select('*')
            .order('created_at', { ascending: false });
        
        if (error) {
            console.error("Error:", error);
            container.innerHTML = '<div class="alert-danger">Gagal memuat data: ' + error.message + '</div>';
            return;
        }
        
        if (!scores || scores.length === 0) {
            container.innerHTML = '<div class="alert-info">Belum ada nilai praktik.</div>';
            return;
        }
        
        let html = `
            <table class="report-table">
                <thead>
                    <tr style="background:#1e6b3b; color:white;">
                        <th>Peserta</th>
                        <th>Kursus</th>
                        <th>Materi</th>
                        <th>Nilai</th>
                        <th>Catatan</th>
                        <th>Tanggal</th>
                    </tr>
                </thead>
                <tbody>
        `;
        
        for (const s of scores) {
            // Ambil nama user
            let userName = s.user_id;
            const { data: userData } = await supabaseClient
                .from('profiles')
                .select('full_name')
                .eq('user_id', s.user_id)
                .single();
            
            if (userData && userData.full_name) {
                userName = userData.full_name;
            }
            
            const course = coursesData.find(c => c.id === s.course_id);
            const lesson = course?.lessons[s.lesson_id];
            const courseTitle = course?.title || '-';
            const lessonTitle = lesson?.title || `Materi ${(s.lesson_id || 0) + 1}`;
            
            html += `
                <tr>
                    <td>${escapeHtml(userName)}</td>
                    <td>${escapeHtml(courseTitle)}</td>
                    <td>${escapeHtml(lessonTitle)}</td>
                    <td style="color:${s.score >= 70 ? '#27ae60' : '#e74c3c'}; font-weight:bold;">${s.score}/100</td>
                    <td>${escapeHtml(s.notes || '-')}</td>
                    <td>${new Date(s.created_at).toLocaleDateString('id-ID')}</td>
                </tr>
            `;
        }
        
        html += `</tbody></table>`;
        container.innerHTML = html;
        
    } catch (err) {
        console.error("Error:", err);
        container.innerHTML = '<div class="alert-danger">Error: ' + err.message + '</div>';
    }
}

async function renderSalesReport() {
    // Ambil data penjualan dari tabel sales_transactions
    let { data: sales, error: salesError } = await supabaseClient
        .from('sales_transactions')
        .select('*')
        .order('created_at', { ascending: false });
    
    // Jika tabel kosong, ambil dari data pembelian di profiles
    if (!sales || sales.length === 0) {
        // Hitung manual dari data yang ada
        const { data: profiles } = await supabaseClient
            .from('profiles')
            .select('*')
            .eq('status', 'approved');
        
        let manualSales = [];
        let totalRevenue = 0;
        
        for (const p of profiles || []) {
            if (p.purchased_courses && p.purchased_courses.length > 0) {
                for (const courseId of p.purchased_courses) {
                    const course = coursesData.find(c => c.id === courseId);
                    if (course) {
                        let amount = p.is_bundle ? 800000 : course.price;
                        if (p.price_paid) amount = p.price_paid;
                        
                        manualSales.push({
                            user_name: p.full_name,
                            course_title: course.title,
                            amount: amount,
                            created_at: p.created_at || new Date().toISOString()
                        });
                        totalRevenue += amount;
                    }
                }
            }
        }
        
        sales = manualSales;
        totalRevenue = totalRevenue;
    } else {
        totalRevenue = sales.reduce((sum, s) => sum + (s.final_amount || s.amount), 0);
    }
    
    // Hitung statistik
    let totalTransactions = sales?.length || 0;
    let averageTransaction = totalTransactions > 0 ? totalRevenue / totalTransactions : 0;
    
    // Hitung transaksi per bulan
    let monthlyData = {};
    for (const s of sales || []) {
        let month = new Date(s.created_at).toLocaleDateString('id-ID', { year: 'numeric', month: 'long' });
        if (!monthlyData[month]) monthlyData[month] = { count: 0, total: 0 };
        monthlyData[month].count++;
        monthlyData[month].total += (s.final_amount || s.amount);
    }
    
    let html = `
        <div class="card">
            <h2>📊 LAPORAN PENJUALAN</h2>
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-number">${totalTransactions}</div><div>Total Transaksi</div></div>
                <div class="stat-card"><div class="stat-number">${formatRupiah(totalRevenue)}</div><div>Total Pendapatan</div></div>
                <div class="stat-card"><div class="stat-number">${formatRupiah(averageTransaction)}</div><div>Rata-Rata Transaksi</div></div>
            </div>
        </div>
        
        <div class="card">
            <h2>📈 PENJUALAN PER BULAN</h2>
            <table class="report-table">
                <thead><tr style="background:#1e6b3b; color:white;"><th>Bulan</th><th>Jumlah Transaksi</th><th>Total Pendapatan</th></tr></thead>
                <tbody>
                    ${Object.entries(monthlyData).map(([month, data]) => `
                        <tr><td>${month}</td><td>${data.count}</td><td>${formatRupiah(data.total)}</td></tr>
                    `).join('') || '<tr><td colspan="3">Belum ada data</td></tr>'}
                </tbody>
            </table>
        </div>
        
        <div class="card">
            <h2>📋 DETAIL TRANSAKSI</h2>
            <div style="overflow-x:auto;">
                <table class="report-table">
                    <thead><tr style="background:#1e6b3b; color:white;">
                        <th>Tanggal</th><th>Pembeli</th><th>Kursus</th><th>Jumlah</th>
                    </tr></thead>
                    <tbody>
                        ${(sales || []).map(s => `
                            <tr>
                                <td>${new Date(s.created_at).toLocaleDateString('id-ID')}</td>
                                <td>${s.user_name || '-'}</td>
                                <td>${s.course_title || '-'}</td>
                                <td>${formatRupiah(s.final_amount || s.amount)}</td>
                            </tr>
                        `).join('') || '<tr><td colspan="4">Belum ada transaksi</td></tr>'}
                    </tbody>
                </table>
            </div>
            <button id="exportSalesBtn" class="btn-success" style="margin-top:15px;">📥 Export CSV</button>
            <button id="backBtn" class="btn-back">Kembali</button>
        </div>
    `;
    
    document.getElementById("adminContent").innerHTML = html;
    
    document.getElementById("backBtn").onclick = () => renderAdminDashboard();
    
    document.getElementById("exportSalesBtn").onclick = () => {
        let csvRows = [["Tanggal", "Pembeli", "Kursus", "Jumlah"]];
        for (const s of sales || []) {
            csvRows.push([
                new Date(s.created_at).toLocaleDateString('id-ID'),
                s.user_name || '-',
                s.course_title || '-',
                s.final_amount || s.amount
            ]);
        }
        let csvContent = csvRows.map(row => row.join(",")).join("\n");
        let blob = new Blob(["\uFEFF" + csvContent], { type: "text/csv" });
        let a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `laporan_penjualan_${new Date().toISOString().slice(0,10)}.csv`;
        a.click();
        URL.revokeObjectURL(a.href);
        alert("✅ Laporan penjualan diexport!");
    };
}

                                <tr>

                                    <td>${p.valid_until ? new Date(p.valid_until).toLocaleDateString('id-ID') : 'Selamanya'}</td>
                                    <td>
                                        <button class="toggle-promo" data-id="${p.id}" data-active="${p.is_active}" style="background:#3498db; padding:5px 10px;">${p.is_active ? 'Nonaktifkan' : 'Aktifkan'}</button>

                                </tr>
                            `).join('')}
                        </tbody>
                    </table>`
                }
            </div>
            <button id="backBtn" class="btn-back" style="margin-top:15px;">Kembali</button>
        </div>
    `;
    
    document.getElementById("adminContent").innerHTML = html;
    
    document.getElementById("backBtn").onclick = () => renderAdminDashboard();
    
    // Tambah promo
    document.getElementById("addPromoForm").onsubmit = async (e) => {
        e.preventDefault();
        
        let code = document.getElementById("promoCode").value.toUpperCase();
        let discount = parseInt(document.getElementById("promoDiscount").value);
        let validUntil = document.getElementById("promoValidUntil").value;
        
        if (!code || !discount) {
            alert("Isi kode promo dan diskon!");
            return;
        }
        
        const { error } = await supabaseClient
            .from('promo_codes')
            .insert({
                code: code,
                discount_percent: discount,
                is_active: true,
                valid_until: validUntil || null,
                created_at: new Date().toISOString()
            });
        
        if (error) {
            alert("Gagal: " + error.message);
        } else {
            alert("✅ Kode promo berhasil ditambahkan!");
            renderPromoManager();
        }
    };
    
    // Toggle promo (aktif/nonaktif)
    document.querySelectorAll(".toggle-promo").forEach(btn => {
        btn.onclick = async () => {
            let id = btn.getAttribute("data-id");
            let currentActive = btn.getAttribute("data-active") === 'true';
            
            const { error } = await supabaseClient
                .from('promo_codes')
                .update({ is_active: !currentActive })
                .eq('id', id);
            
            if (error) {
                alert("Gagal: " + error.message);
            } else {
                alert(`✅ Kode promo ${!currentActive ? 'diaktifkan' : 'dinonaktifkan'}`);
                renderPromoManager();
            }
        };
    });
    
    // Hapus promo
    document.querySelectorAll(".delete-promo").forEach(btn => {
        btn.onclick = async () => {
            if (confirm("Hapus kode promo ini?")) {
                let id = btn.getAttribute("data-id");
                const { error } = await supabaseClient
                    .from('promo_codes')
                    .delete()
                    .eq('id', id);
                
                if (error) {
                    alert("Gagal: " + error.message);
                } else {
                    alert("✅ Kode promo dihapus!");
                    renderPromoManager();
                }
            }
        };
    });
}

        .order('created_at', { ascending: false });
    
    if (error) {
        console.error("Error load sales:", error);
    }
    
    // Hitung total pendapatan
    let totalRevenue = 0;
    let monthlyRevenue = {};
    let yearlyRevenue = {};
    
    for (const s of sales || []) {
        let amount = s.final_amount || s.amount;
        totalRevenue += amount;
        
        let date = new Date(s.created_at);
        let monthKey = `${date.getFullYear()}-${date.getMonth() + 1}`;
        let monthName = date.toLocaleDateString('id-ID', { year: 'numeric', month: 'long' });
        let yearKey = `${date.getFullYear()}`;
        
        if (!monthlyRevenue[monthKey]) {
            monthlyRevenue[monthKey] = { name: monthName, total: 0, count: 0 };
        }
        monthlyRevenue[monthKey].total += amount;
        monthlyRevenue[monthKey].count++;
        
        if (!yearlyRevenue[yearKey]) yearlyRevenue[yearKey] = 0;
        yearlyRevenue[yearKey] += amount;
    }
    
    // Hitung pajak (0.5% dari omzet untuk UMKM)
    let taxRate = 0.5;
    let taxAmount = totalRevenue * (taxRate / 100);
    let netProfit = totalRevenue - taxAmount;
    
    let currentYear = new Date().getFullYear();
    let currentYearRevenue = yearlyRevenue[currentYear] || 0;
    let currentYearTax = currentYearRevenue * (taxRate / 100);
    
    let html = `
        <div class="card">
            <h2>💰 LAPORAN KEUANGAN & PAJAK</h2>
            <div class="alert-info" style="margin-bottom:15px;">
                <strong>📌 Keterangan:</strong><br>
                • Pajak UMKM: <strong>0,5%</strong> dari omzet bruto (PP No. 23/2018)<br>
                • Omzet di bawah Rp 500 juta/tahun: <strong>TIDAK KENA PAJAK</strong>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-number">${formatRupiah(totalRevenue)}</div><div>Total Omzet</div></div>
                <div class="stat-card"><div class="stat-number">${formatRupiah(taxAmount)}</div><div>Pajak (0,5%)</div></div>
                <div class="stat-card"><div class="stat-number">${formatRupiah(netProfit)}</div><div>Laba Bersih</div></div>
            </div>
            
            <div class="alert-warning" style="margin-top:15px; padding:15px;">
                <strong>⚠️ Catatan Pajak:</strong><br>
                • Jika omzet setahun <strong>${formatRupiah(500000000)}</strong>, maka <strong>TIDAK ADA KEWAJIBAN PAJAK</strong><br>
                • Omzet tahun ini: ${formatRupiah(currentYearRevenue)} 
                ${currentYearRevenue >= 500000000 ? '(⚠️ Sudah melebihi batas, wajib lapor pajak)' : '(✅ Masih di bawah batas, bebas pajak)'}
            </div>
        </div>
        
        <div class="card">
            <h2>📅 PENDAPATAN PER TAHUN</h2>
            <table class="report-table">
                <thead><tr style="background:#1e6b3b; color:white;"><th>Tahun</th><th>Omzet</th><th>Pajak (0,5%)</th><th>Status</th></tr></thead>
                <tbody>
                    ${Object.entries(yearlyRevenue).map(([year, amount]) => {
                        let tax = amount * (taxRate / 100);
                        let isTaxable = amount >= 500000000;
                        return `<tr>
                            <td>${year}</td>
                            <td>${formatRupiah(amount)}</td>
                            <td>${formatRupiah(tax)}</td>
                            <td style="color:${isTaxable ? '#e74c3c' : '#27ae60'}">${isTaxable ? 'Wajib Lapor' : 'Bebas Pajak'}</td>
                        </tr>`;
                    }).join('') || '<tr><td colspan="4">Belum ada data</td></tr>'}
                </tbody>
            </table>
        </div>
        
        <div class="card">
            <h2>📆 PENDAPATAN PER BULAN</h2>
            <div style="overflow-x:auto;">
                <table class="report-table">
                    <thead><tr style="background:#1e6b3b; color:white;"><th>Bulan</th><th>Transaksi</th><th>Omzet</th><th>Pajak</th></tr></thead>
                    <tbody>
                        ${Object.entries(monthlyRevenue).map(([key, data]) => {
                            let tax = data.total * (taxRate / 100);
                            return `<tr>
                                <td>${data.name}</td>
                                <td>${data.count} kali</td>
                                <td>${formatRupiah(data.total)}</td>
                                <td>${formatRupiah(tax)}</td>
                            </tr>`;
                        }).join('') || '<tr><td colspan="4">Belum ada data</td></tr>'}
                    </tbody>
                </table>
            </div>
        </div>
        
        <div class="card">
            <h2>🧾 SURAT KETERANGAN PAJAK</h2>
            <div style="background:white; padding:20px; border-radius:12px; border:1px solid #ddd; color:#333;">
                <p style="text-align:center; font-weight:bold; font-size:14pt;">ALFARUQ ONLINE COURSE</p>
                <p style="text-align:center;">Laporan Penghasilan UMKM</p>
                <hr>
                <p><strong>Periode:</strong> Januari - Desember ${currentYear}</p>
                <p><strong>Total Omzet:</strong> ${formatRupiah(currentYearRevenue)}</p>
                <p><strong>Pajak UMKM (0,5%):</strong> ${formatRupiah(currentYearTax)}</p>
                <p><strong>Status:</strong> ${currentYearRevenue >= 500000000 ? 'Wajib Lapor SPT Masa PPh Final UMKM' : 'Omzet masih di bawah Rp 500 juta, tidak wajib lapor pajak'}</p>
                <hr>
                <p style="font-size:9pt; color:#999;">*Dihasilkan secara otomatis oleh sistem</p>
            </div>
            <button id="printTaxReport" class="btn-primary" style="margin-top:15px;">🖨️ Cetak Laporan Pajak</button>
        </div>
        
        <button id="backBtn" class="btn-back">Kembali</button>
    `;
    
    document.getElementById("adminContent").innerHTML = html;
    
    document.getElementById("backBtn").onclick = () => renderAdminDashboard();
    
    document.getElementById("printTaxReport").onclick = () => {
        let printContent = document.querySelector(".card:last-child div");
        let printWindow = window.open('', '_blank');
        printWindow.document.write(`
            <html><head><title>Laporan Pajak ALFARUQ</title>
            <style>
                body { font-family: Arial, sans-serif; padding: 40px; }
                .header { text-align: center; margin-bottom: 30px; }
                table { width: 100%; border-collapse: collapse; margin: 10px 0; }
                td, th { border: 1px solid #ddd; padding: 8px; }
            </style>
            </head>
            <body>${printContent.outerHTML}</body></html>
        `);
        printWindow.document.close();
        printWindow.print();
    };
}
async function renderStudentDashboard() {
    let { data: profiles } = await supabaseClient.from('profiles').select('*');
    let html = `<div class="card"><h2>Manajemen Peserta</h2><table class="report-table"><thead><tr><th>Nama</th><th>User ID</th><th>Status</th><th>Aksi</th></tr></thead>
        <tbody>${(profiles || []).map(p => `<tr><td>${p.full_name || '-'}</td><td>${p.user_id}</td><td>${p.status || 'pending'}</td>
        <td><button class="btn-ban-user" data-id="${p.user_id}" style="background:#e74c3c;">Ban</button></td></tr>`).join('')}</tbody></table><button id="backBtn" class="btn-back">Kembali</button></div>`;
    document.getElementById("adminContent").innerHTML = html;
    document.getElementById("backBtn").onclick = () => renderAdminDashboard();
    document.querySelectorAll(".btn-ban-user").forEach(btn => { btn.onclick = async () => { await supabaseClient.from('profiles').update({ status: 'banned' }).eq('user_id', btn.getAttribute("data-id")); alert("User dibanned!"); renderStudentDashboard(); }; });
}

async function renderEarlyBirdSettings() {
    await loadAppSettings();
    let html = `<div class="card"><h2>Pengaturan Early Bird</h2><form id="earlyBirdForm"><div class="form-group"><label>Aktifkan Early Bird</label><select id="earlyBirdEnabled"><option value="true" ${settings.earlyBirdEnabled ? 'selected' : ''}>Ya</option><option value="false" ${!settings.earlyBirdEnabled ? 'selected' : ''}>Tidak</option></select></div>
        <div class="form-group"><label>Diskon (%)</label><input type="number" id="earlyBirdDiscount" value="${settings.earlyBirdDiscount}"></div>
        <div class="form-group"><label>Tanggal Berakhir</label><input type="datetime-local" id="earlyBirdEndDate" value="${settings.earlyBirdEndDate.slice(0, 16)}"></div>
        <button type="submit" class="btn-success">Simpan</button><button type="button" id="backBtn" class="btn-back">Kembali</button></form></div>`;
    document.getElementById("adminContent").innerHTML = html;
    document.getElementById("backBtn").onclick = () => renderAdminDashboard();
    document.getElementById("earlyBirdForm").onsubmit = async (e) => {
        e.preventDefault();
        await supabaseClient.from('app_settings').upsert({ key: 'early_bird_enabled', value: document.getElementById("earlyBirdEnabled").value }, { onConflict: 'key' });
        await supabaseClient.from('app_settings').upsert({ key: 'early_bird_discount', value: document.getElementById("earlyBirdDiscount").value }, { onConflict: 'key' });
        await supabaseClient.from('app_settings').upsert({ key: 'early_bird_end_date', value: document.getElementById("earlyBirdEndDate").value }, { onConflict: 'key' });
        alert("Pengaturan disimpan!"); renderEarlyBirdSettings();
    };
}

// ======================== GRADUATED STUDENTS ADMIN PANEL ========================
async function renderGraduatedStudents() {
    document.getElementById("adminContent").innerHTML = '<div class="card"><div class="alert-info">Memuat data peserta lulus...</div></div>';

    // Load all certificates
    const { data: certs, error } = await supabaseClient
        .from('certificates')
        .select('*')
        .order('issued_at', { ascending: false });

    if (error) {
        document.getElementById("adminContent").innerHTML = `<div class="card"><div class="alert-danger">Gagal memuat data: ${error.message}</div><button id="backBtn" class="btn-back">Kembali</button></div>`;
        document.getElementById("backBtn").onclick = () => renderAdminDashboard();
        return;
    }

    let html = `
        <div class="card">
            <h2>🎓 Peserta yang Telah Lulus</h2>
            <div class="alert-info" style="margin-bottom:15px;">
                Total sertifikat diterbitkan: <strong>${(certs || []).length}</strong>
            </div>
            ${!certs || certs.length === 0 ? '<div class="alert-warning">Belum ada peserta yang lulus.</div>' : `
            <div style="overflow-x:auto;">
                <table class="report-table">
                    <thead>
                        <tr style="background:#1e6b3b; color:white;">
                            <th>No</th>
                            <th>Nama Peserta</th>
                            <th>Kursus</th>
                            <th>Nomor Sertifikat (QR)</th>
                            <th>Nilai Akhir</th>
                            <th>Tanggal Lulus</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${(certs || []).map((c, idx) => `
                            <tr>
                                <td>${idx + 1}</td>
                                <td><strong>${escapeHtml(c.user_name || '-')}</strong></td>
                                <td>${escapeHtml(c.course_title || '-')}</td>
                                <td>
                                    <code style="font-size:0.8rem; background:#f0f0f0; padding:3px 8px; border-radius:6px;">${escapeHtml(c.cert_number || '-')}</code>
                                    <div id="qr_${idx}" style="margin-top:5px;"></div>
                                </td>
                                <td style="text-align:center; font-weight:bold; color:${(c.final_score||0) >= 75 ? '#27ae60' : '#e74c3c'};">${c.final_score || '-'}/100</td>
                                <td>${c.issued_at ? new Date(c.issued_at).toLocaleDateString('id-ID', {day:'numeric',month:'long',year:'numeric'}) : '-'}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
            <button id="exportCertsBtn" class="btn-success" style="margin-top:15px;">📥 Export CSV</button>
            `}
            <button id="backBtn" class="btn-back" style="margin-top:15px;">Kembali</button>
        </div>
    `;

    document.getElementById("adminContent").innerHTML = html;
    document.getElementById("backBtn").onclick = () => renderAdminDashboard();

    // Render small QR codes for each cert number
    if (certs && certs.length > 0) {
        certs.forEach((c, idx) => {
            const el = document.getElementById(`qr_${idx}`);
            if (el && c.cert_number) {
                try {
                    new QRCode(el, {
                        text: `${window.location.origin}${window.location.pathname}?verify=${c.cert_number}`,
                        width: 64,
                        height: 64,
                        correctLevel: QRCode.CorrectLevel.M
                    });
                } catch(e) { console.warn('QR admin:', e); }
            }
        });
    }

    if (document.getElementById("exportCertsBtn")) {
        document.getElementById("exportCertsBtn").onclick = () => {
            let rows = [["No","Nama","Kursus","Nomor Sertifikat","Nilai","Tanggal"]];
            (certs || []).forEach((c, idx) => {
                rows.push([
                    idx + 1,
                    c.user_name || '-',
                    c.course_title || '-',
                    c.cert_number || '-',
                    c.final_score || '-',
                    c.issued_at ? new Date(c.issued_at).toLocaleDateString('id-ID') : '-'
                ]);
            });
            let csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
            let blob = new Blob(["\uFEFF" + csv], { type: "text/csv" });
            let a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `peserta_lulus_${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
        };
    }
}

// ======================== ROUTING ========================
async function route() {
    let hash = window.location.hash.slice(1);
    if (!supabaseClient) { showLoading(); let success = await initSupabase(); if (!success) return; }
    if (hash === "" || hash === "landing") renderLandingPage();
    else if (hash === "register") renderRegisterForm(false);
    else if (hash === "register-bundle") renderRegisterForm(true);
    else if (hash === "login") renderLoginForm();
    else if (hash === "forgot-password") renderForgotPassword();
    else if (hash === "dashboard") { if (currentUser) renderUserDashboard(); else window.location.hash = "#login"; }
    else if (hash === "admin") renderAdminLogin();
    else if (hash === "admin-dashboard") { if (isAdmin) renderAdminDashboard(); else { alert("Akses ditolak"); window.location.hash = "#landing"; } }
    else renderLandingPage();
}

// ======================== INIT ========================
window.addEventListener("hashchange", route);
let saved = localStorage.getItem("darkMode");
if (saved === "true") document.documentElement.setAttribute("data-theme", "dark");
route();
</script>
