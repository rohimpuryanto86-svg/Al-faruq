        async function loadAppSettings() {
            const { data } = await supabaseClient.from('app_settings').select('key, value');

                if (appSettings.early_bird_end_date) settings.earlyBirdEndDate = appSettings.early_bird_end_date;
            }
        }

            if (!currentUser) return;
            const { data } = await supabaseClient.from('profiles').select('*').eq('user_id', currentUser.id).single();

                    let diff = endDate - now;
                    let days = Math.floor(diff / (1000 * 60 * 60 * 24));
                    let hours = Math.floor((diff % (86400000)) / 3600000);
                    let minutes = Math.floor((diff % 3600000) / 60000);
                    let seconds = Math.floor((diff % 60000) / 1000);
                    statusDiv.innerHTML = `<div class="alert-success">🔥 Early Bird AKTIF! Diskon ${discount}% berlaku selama: <strong>${days} hari ${hours} jam ${minutes} menit ${seconds} detik</strong> lagi!</div>`;
                }
            }
            
            let interval = setInterval(updateStatus, 1000);
            updateStatus();
            
            document.getElementById("backBtn").onclick = () => {
                clearInterval(interval);
                renderAdminDashboard();
            };
            
            document.getElementById("earlyBirdForm").onsubmit = async (e) => {
                e.preventDefault();
                
                let newEnabled = document.getElementById("earlyBirdEnabled").value === "true";
                let newDiscount = parseInt(document.getElementById("earlyBirdDiscount").value);
                let newEndDate = document.getElementById("earlyBirdEndDate").value;
                
                await saveEarlyBirdSettings(newEnabled, newDiscount, newEndDate);
                alert("✅ Pengaturan Early Bird disimpan!");
                
                clearInterval(interval);
                renderEarlyBirdSettings();
            };
        }
        
        // ======================== ADMIN PANEL ========================
        function renderAdminLogin() {
            let html = `<div class="card"><h2>🔧 Admin Login</h2><form id="adminForm">
                <div class="form-group"><label>Email</label><input type="email" id="adminEmail"></div>
                <div class="form-group"><label>Password</label><input type="password" id="adminPass"></div>
                <button type="submit">Login</button>
                <button onclick="window.location.hash='#landing'" class="btn-outline">Kembali</button>
            </form></div>`;
            document.getElementById("appRoot").innerHTML = html;
            document.getElementById("adminForm").onsubmit = async (e) => {
                e.preventDefault();
                let email = document.getElementById("adminEmail").value, password = document.getElementById("adminPass").value;
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) { alert("Login gagal: " + error.message); return; }
                currentUser = data.user;
                await loadUserProfile();
                await checkAdminStatus();
                if (isAdmin) { 
                    window.location.hash = "#admin-dashboard"; 
                } else { 
                    alert("Akun Anda bukan admin. Pastikan email Anda sudah terdaftar sebagai admin di database."); 
                    await supabaseClient.auth.signOut(); 
                }
            };
        }
        
        async function renderAdminDashboard() {
            const { data: pendingUsers } = await supabaseClient.from('profiles').select('*').eq('status', 'pending');
            const pendingWithdraws = withdrawRequests.filter(w => w.status === 'pending');
            
            let html = `<div class="tabs">
                <div class="tab" id="logoutAdmin">🚪 Logout</div>
                <div class="tab active">🔧 Admin Panel</div>
                <div class="tab" id="generalSettingsTab">⚙️ Pengaturan Umum</div>
                <div class="tab" id="editCourseJsonTab">📋 Edit Kursus (JSON)</div>
                <div class="tab" id="salesReportTab">📊 Laporan Penjualan</div>
                <div class="tab" id="promoTab">🏷️ Diskon</div>
                <div class="tab" id="financialTab">📈 Laporan Keuangan</div>
                <div class="tab" id="studentMgmtTab">👥 Manajemen Peserta</div>
                <div class="tab" id="earlyBirdTab">🔥 Early Bird</div>
            </div>
            <div class="admin-menu">
                <button id="refreshBtn" class="btn-edit">🔄 Refresh</button>
            </div>
            <div id="adminContent">
                <div class="card"><h2>📋 Pendaftaran Menunggu (${pendingUsers?.length || 0})</h2>${(pendingUsers || []).map(u => `<div style="border-bottom:1px solid #eee; padding:10px;"><strong>${u.full_name}</strong> (${u.email})<br>📞 ${u.phone || '-'}<br><button class="btn-approve" data-user="${u.user_id}" style="background:#27ae60;">✅ Setujui</button> <button class="btn-reject" data-user="${u.user_id}" style="background:#e74c3c;">❌ Tolak</button></div>`).join('') || '<p>Tidak ada pendaftaran pending.</p>'}</div>
                <div class="card"><h2>💰 Request Withdraw (${pendingWithdraws.length})</h2>${pendingWithdraws.map(w => `<div style="border-bottom:1px solid #eee; padding:10px;"><strong>${w.user_name || w.user_id}</strong> - Rp ${w.amount.toLocaleString()}<br><button class="approve-withdraw" data-id="${w.id}" style="background:#27ae60;">✅ Setujui</button> <button class="reject-withdraw" data-id="${w.id}" style="background:#e74c3c;">❌ Tolak</button></div>`).join('') || '<p>Tidak ada request withdraw.</p>'}</div>
            </div>
            <button id="backBtn" class="btn-back">Kembali ke Beranda</button>`;
            document.getElementById("appRoot").innerHTML = html;
            
            document.getElementById("logoutAdmin").onclick = async () => { await supabaseClient.auth.signOut(); window.location.hash = "#landing"; };
            document.getElementById("backBtn").onclick = () => window.location.hash = "#landing";
            document.getElementById("refreshBtn").onclick = () => renderAdminDashboard();
            document.getElementById("generalSettingsTab").onclick = () => renderGeneralSettings();
            document.getElementById("editCourseJsonTab").onclick = () => renderEditCourseJson();
            document.getElementById("salesReportTab").onclick = () => renderSalesReport();
            document.getElementById("promoTab").onclick = () => renderPromoManager();
            document.getElementById("financialTab").onclick = () => renderFinancialReport();
            document.getElementById("studentMgmtTab").onclick = () => renderStudentDashboard();
            document.getElementById("earlyBirdTab").onclick = () => renderEarlyBirdSettings();
            
            document.querySelectorAll(".btn-approve").forEach(btn => { btn.onclick = async () => { await supabaseClient.from('profiles').update({ status: 'approved' }).eq('user_id', btn.getAttribute("data-user")); alert("✅ User disetujui!"); renderAdminDashboard(); }; });
            document.querySelectorAll(".btn-reject").forEach(btn => { btn.onclick = async () => { if(confirm("Tolak pendaftaran user ini?")) { await supabaseClient.from('profiles').delete().eq('user_id', btn.getAttribute("data-user")); alert("❌ User ditolak!"); renderAdminDashboard(); } }; });
            document.querySelectorAll(".approve-withdraw").forEach(btn => { btn.onclick = async () => { await approveWithdraw(btn.getAttribute("data-id")); renderAdminDashboard(); }; });
            document.querySelectorAll(".reject-withdraw").forEach(btn => { btn.onclick = async () => { await rejectWithdraw(btn.getAttribute("data-id")); renderAdminDashboard(); }; });
        }
        
        async function renderGeneralSettings() {
            await loadAppSettings();
            let html = `<div class="card"><h2>⚙️ Pengaturan Umum</h2>
            <form id="generalSettingsForm">
                <div class="form-group"><label>📞 Nomor WhatsApp Admin</label><input type="text" id="whatsappNumber" value="${settings.defaultWhatsappNumber}"></div>
                <div class="form-group"><label>📱 Pesan WhatsApp Default</label><textarea id="whatsappMessage" rows="3">${settings.defaultWhatsappMessage}</textarea></div>
                <button type="submit" class="btn-success">💾 Simpan</button>
                <button type="button" id="backBtn" class="btn-back">Kembali</button>
            </form></div>`;
            document.getElementById("adminContent").innerHTML = html;
            document.getElementById("backBtn").onclick = () => renderAdminDashboard();
            document.getElementById("generalSettingsForm").onsubmit = async (e) => {
                e.preventDefault();
                await saveAppSettings(
                    document.getElementById("whatsappNumber").value,
                    document.getElementById("whatsappMessage").value,
                    settings.webhookUrl,
                    ""
                );
                alert("✅ Pengaturan disimpan!");
                renderGeneralSettings();
            };
        }
        
        async function renderEditCourseJson() {
            let html = `<div class="card"><h2>📁 Edit Kursus via JSON</h2>
            <div class="course-grid">${coursesData.map(course => `<div class="course-card"><div class="course-icon">${course.icon || '📚'}</div>
            <div class="course-title">${course.title}</div><button class="edit-json-btn" data-id="${course.id}" style="background:#3498db;">📋 Edit</button>
            <button class="download-json-btn" data-id="${course.id}" style="background:#27ae60;">📥 Download</button></div>`).join('')}</div>
            <button id="backBtn" class="btn-back">Kembali</button></div>`;
            document.getElementById("adminContent").innerHTML = html;
            document.getElementById("backBtn").onclick = () => renderAdminDashboard();
            
            document.querySelectorAll(".edit-json-btn").forEach(btn => {
                btn.onclick = async () => {
                    let course = coursesData.find(c => c.id == btn.getAttribute("data-id"));
                    let newJson = prompt("Edit JSON:", JSON.stringify(course, null, 2));
                    if (newJson) {
                        try {
                            let parsed = JSON.parse(newJson);
                            await saveCourse(parsed);
                            alert("✅ Kursus disimpan!");
                            renderEditCourseJson();
                        } catch(e) { alert("JSON tidak valid: " + e.message); }
                    }
                };
            });
            
            document.querySelectorAll(".download-json-btn").forEach(btn => {
                btn.onclick = () => {
                    let course = coursesData.find(c => c.id == btn.getAttribute("data-id"));
                    let dataStr = JSON.stringify(course, null, 2);
                    let blob = new Blob([dataStr], { type: "application/json" });
                    let url = URL.createObjectURL(blob);
                    let a = document.createElement("a"); a.href = url; a.download = `course_${course.id}.json`; a.click(); URL.revokeObjectURL(url);
                };
            });
        }
        
        async function renderPromoManager() {
            await loadPromoData();
            let html = `<div class="card"><h2>🏷️ Manajemen Diskon</h2><button id="addPromoBtn" class="btn-success">+ Tambah</button>
            <div id="promoList">${promoData.map(p => `<div style="border-bottom:1px solid #eee; padding:10px;"><strong>${p.code}</strong> - ${p.discount_percent}% | ${p.is_active ? '✅ Aktif' : '⏸ Nonaktif'}<br><button class="delete-promo" data-id="${p.id}" style="background:#e74c3c;">🗑 Hapus</button></div>`).join('') || '<p>Belum ada kode promo.</p>'}</div>
            <button id="backBtn" class="btn-back">Kembali</button></div>`;
            document.getElementById("adminContent").innerHTML = html;
            document.getElementById("backBtn").onclick = () => renderAdminDashboard();
            document.getElementById("addPromoBtn").onclick = () => renderAddPromoForm();
            document.querySelectorAll(".delete-promo").forEach(btn => { btn.onclick = async () => { if(confirm("Hapus?")) { await deletePromoCode(btn.dataset.id); renderPromoManager(); } }; });
        }
        
        function renderAddPromoForm() {
            let html = `<div class="card"><h2>➕ Tambah Diskon</h2><form id="promoForm"><div class="form-group"><label>Kode</label><input type="text" id="code" required></div>
            <div class="form-group"><label>Diskon (%)</label><input type="number" id="discount" min="0" max="100" required></div>
            <button type="submit" class="btn-success">💾 Simpan</button><button type="button" id="backBtn" class="btn-back">Kembali</button></form></div>`;
            document.getElementById("adminContent").innerHTML = html;
            document.getElementById("backBtn").onclick = () => renderPromoManager();
            document.getElementById("promoForm").onsubmit = async (e) => {
                e.preventDefault();
                await savePromoCode({ code: document.getElementById("code").value.toUpperCase(), discount_percent: parseInt(document.getElementById("discount").value), is_active: true });
                alert("✅ Diskon ditambahkan!");
                renderPromoManager();
            };
        }
        
        async function renderSalesReport() {
            let { data: profiles } = await supabaseClient.from('profiles').select('*').eq('status', 'approved');
            let totalRevenue = (profiles || []).reduce((sum, p) => sum + (p.price || 0), 0);
            let html = `<div class="card"><h2>📊 Laporan Penjualan</h2><div class="price-card"><h3>Total Penjualan</h3><div class="price-new">${formatRupiah(totalRevenue)}</div></div>
            <button id="backBtn" class="btn-back">Kembali</button></div>`;
            document.getElementById("adminContent").innerHTML = html;
            document.getElementById("backBtn").onclick = () => renderAdminDashboard();
        }
        
        async function renderFinancialReport() {
            let html = `<div class="card"><h2>📊 Laporan Keuangan</h2><div class="alert-info">Fitur laporan keuangan akan segera hadir</div>
            <button id="backBtn" class="btn-back">Kembali</button></div>`;
            document.getElementById("adminContent").innerHTML = html;
            document.getElementById("backBtn").onclick = () => renderAdminDashboard();
        }
        
        async function renderStudentDashboard() {
            const { data: profiles } = await supabaseClient.from('profiles').select('*');
            let html = `<div class="card"><h2>📋 Daftar Peserta (${profiles?.length || 0})</h2>
            <table class="mufradat-table"><thead>运转<th>Nama</th><th>Email</th><th>WhatsApp</th><th>Status</th><th>Aksi</th></tr></thead><tbody>${(profiles || []).map(p => `<tr><td>${escapeHtml(p.full_name)}</div><td>${p.user_id}</div><td>${p.phone || '-'}</div><td>${p.status || 'pending'}</div><td><button class="btn-ban" data-user="${p.user_id}" style="background:#e74c3c;">🚫 Ban</button></div></tr>`).join('')}</tbody></table>
            <button id="backBtn" class="btn-back">Kembali</button></div>`;
            document.getElementById("adminContent").innerHTML = html;
            document.getElementById("backBtn").onclick = () => renderAdminDashboard();
            document.querySelectorAll(".btn-ban").forEach(btn => { btn.onclick = async () => { if(confirm("Ban user?")) { await supabaseClient.from('profiles').update({ account_status: 'banned', status: 'banned' }).eq('user_id', btn.getAttribute("data-user")); alert("✅ User dibanned!"); renderStudentDashboard(); } }; });
        }
        
        // ======================== ROUTING ========================
        async function route() {
            let hash = window.location.hash.slice(1);
            if (!supabaseClient) {
                const initSuccess = await initSupabase();
                if (!initSuccess) return;
            }
            if (hash === "" || hash === "landing") renderLandingPage();
            else if (hash === "register") renderRegisterForm(false);
            else if (hash === "register-bundle") renderRegisterForm(true);
            else if (hash === "login") renderLoginForm();
            else if (hash === "forgot-password") renderForgotPassword();
            else if (hash === "dashboard") { if (currentUser) renderUserDashboard(); else window.location.hash = "#login"; }
            else if (hash === "admin") renderAdminLogin();
            else if (hash === "admin-dashboard") { if (isAdmin) renderAdminDashboard(); else { alert("Akses ditolak. Anda bukan admin."); window.location.hash = "#landing"; } }
            else renderLandingPage();
        }
        
        window.addEventListener("hashchange", route);
        let savedDarkMode = localStorage.getItem("darkMode");
        if (savedDarkMode === "true") document.documentElement.setAttribute("data-theme", "dark");
        route();
    </script>
</body>
</html>
