        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function formatRupiah(amount) {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(amount);

        async function uploadToImgBB(file) {

        // ======================== SUPABASE INIT & DATA LOADING ========================
        async function initSupabase() {
            try {
                if (typeof supabase === 'undefined') { 
                    console.error("Supabase library not loaded!"); 
                    return false; 
                }
                supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (session) {
                    currentUser = session.user;
                    await loadUserProfile();
                    await checkAdminStatus();
                }
                await loadCourses();
                await loadAppSettings();
                await loadPromoData();
                await loadWithdrawRequests();
                await loadPracticalScores();
                return true;
            } catch (error) { 
                console.error("Supabase initialization failed:", error); 
                return false; 
            }
        }
        
        async function loadAppSettings() {
            const { data } = await supabaseClient.from('app_settings').select('key, value');
            if (data) {
                appSettings = {};
                data.forEach(s => { appSettings[s.key] = s.value; });
                if (appSettings.default_whatsapp_number) settings.defaultWhatsappNumber = appSettings.default_whatsapp_number;
                if (appSettings.default_whatsapp_message) settings.defaultWhatsappMessage = appSettings.default_whatsapp_message;
                if (appSettings.early_bird_enabled) settings.earlyBirdEnabled = appSettings.early_bird_enabled === 'true';
                if (appSettings.early_bird_discount) settings.earlyBirdDiscount = parseInt(appSettings.early_bird_discount);
                if (appSettings.early_bird_end_date) settings.earlyBirdEndDate = appSettings.early_bird_end_date;
                if (appSettings.tax_type) settings.taxType = appSettings.tax_type;
                if (appSettings.tax_rate) settings.taxRate = parseFloat(appSettings.tax_rate);
            }
        }
        
        async function loadUserProfile() {
            if (!currentUser) return;
            const { data } = await supabaseClient.from('profiles').select('*').eq('user_id', currentUser.id).single();
            if (data) {
                currentUser.profile = data;
                currentUser.name = data.full_name;
                currentUser.commission = data.commission || 0;
                currentUser.referralCode = data.referral_code;
                currentUser.phone = data.phone;
                currentUser.status = data.status;
                currentUser.selectedCourse = data.selected_course;
                currentUser.isBundle = data.is_bundle || false;
                currentUser.pricePaid = data.price_paid || 0;
                currentUser.purchasedCourses = data.purchased_courses || [];
                currentUser.completedLessons = {};
                await loadUserProgress();
            }
        }
        
        async function loadUserProgress() {
            const { data } = await supabaseClient.from('user_progress').select('*').eq('user_id', currentUser.id);
            if (data) { data.forEach(p => { currentUser.completedLessons[p.course_id] = p.completed_lessons || []; }); }
        }
        
        async function checkAdminStatus() {
            const { data, error } = await supabaseClient
                .from('user_roles')
                .select('is_admin')
                .eq('user_id', currentUser.id)
                .single();
            isAdmin = data?.is_admin === true;
            return isAdmin;
        }
        
        async function loadCourses() {
            const { data } = await supabaseClient.from('courses').select('*').order('id');
            if (data && data.length > 0) {
                coursesData = data.map(c => ({ ...c, lessons: c.lessons || [], price: c.price || 200000, desc: c.description, telegram_link: c.telegram_link || '', telegram_group: c.telegram_group || '' }));
            } else {
                const defaultCourses = [
                    { id: 1, title: "📖 Baca Al-Qur'an", icon: "📖", description: "Metode tahsin sederhana, praktik dari juz 30", price: 200000, telegram_group: "https://t.me/alfaruq_quran_group", telegram_link: "https://t.me/alfaruq_quran", lessons: [] },
                    { id: 2, title: "📚 Baca Kitab Gundul", icon: "📚", description: "Kenali huruf hijaiyah, pola nahwu-sharaf dasar", price: 200000, telegram_group: "https://t.me/alfaruq_kitab_group", telegram_link: "https://t.me/alfaruq_kitab", lessons: [] },
                    { id: 3, title: "🕋 Bahasa Arab Umroh", icon: "🕋", description: "300+ kosakata, simulasi dialog", price: 200000, telegram_group: "https://t.me/alfaruq_arab_group", telegram_link: "https://t.me/alfaruq_arab", lessons: [] },
                    { id: 4, title: "🕌 Shalat Khusyu'", icon: "🕌", description: "Makna bacaan shalat, tips khusyu' terbukti", price: 200000, telegram_group: "https://t.me/alfaruq_shalat_group", telegram_link: "https://t.me/alfaruq_shalat", lessons: [] }
                ];
                for (const c of defaultCourses) {
                    await supabaseClient.from('courses').upsert(c);
                }
                coursesData = defaultCourses;
            }
            return coursesData;
        }
        
        async function saveCourse(course) {
            await supabaseClient.from('courses').upsert({
                id: course.id, title: course.title, description: course.desc, icon: course.icon,
                price: course.price, lessons: course.lessons, telegram_link: course.telegramLink, telegram_group: course.telegramGroup
            });
            await loadCourses();
        }
        
        function isCourseAccessible(courseId) {
            if (isAdmin) return true;
            if (currentUser?.isBundle) return true;
            if (currentUser?.selectedCourse === courseId) return true;
            if (currentUser?.purchasedCourses?.includes(courseId)) return true;
            return false;
        }
        
        async function purchaseCourseWithWallet(courseId, price) {
            if (currentUser.commission < price) {
                alert(`❌ Saldo tidak cukup! Saldo Anda: ${formatRupiah(currentUser.commission)}`);
                return false;
            }
            
            if (isCourseAccessible(courseId)) {
                alert("✅ Anda sudah memiliki akses ke kursus ini!");
                return false;
            }
            
            const confirmBuy = confirm(`Beli ${coursesData.find(c => c.id === courseId)?.title} seharga ${formatRupiah(price)}?`);
            if (!confirmBuy) return false;
            
            // Kurangi saldo
            const newBalance = currentUser.commission - price;
            await supabaseClient.from('profiles').update({ 
                commission: newBalance,
                purchased_courses: [...(currentUser.purchasedCourses || []), courseId]
            }).eq('user_id', currentUser.id);
            
            // Catat transaksi
            await supabaseClient.from('transactions').insert({
                user_id: currentUser.id,
                type: 'purchase',
                amount: price,
                description: `Pembelian kursus: ${coursesData.find(c => c.id === courseId)?.title}`,
                status: 'completed'
            });
            
            currentUser.commission = newBalance;
            currentUser.purchasedCourses = [...(currentUser.purchasedCourses || []), courseId];
            
            alert(`✅ Berhasil membeli kursus! Saldo Anda sekarang: ${formatRupiah(newBalance)}`);
            return true;
        }
        
        async function loadPromoData() {
            const { data } = await supabaseClient.from('promo_codes').select('*').order('id');
            promoData = data || [];
        }
        
        async function savePromoCode(promo) {
            await supabaseClient.from('promo_codes').upsert(promo);
            await loadPromoData();
        }
        
        async function deletePromoCode(id) {
            await supabaseClient.from('promo_codes').delete().eq('id', id);
            await loadPromoData();
        }
        
        async function loadWithdrawRequests() {
            const { data } = await supabaseClient.from('withdraw_requests').select('*').order('request_date', { ascending: false });
            withdrawRequests = data || [];
        }
        
        async function approveWithdraw(id) {
            await supabaseClient.from('withdraw_requests').update({ status: 'approved', processed_date: new Date().toISOString() }).eq('id', id);
            await loadWithdrawRequests();
        }

            await supabaseClient.from('withdraw_requests').update({ status: 'rejected', processed_date: new Date().toISOString() }).eq('id', id);
            await loadWithdrawRequests();
        }

            const { data } = await supabaseClient.from('practical_scores').select('*, profiles(full_name)').order('evaluated_at', { ascending: false });
            practicalScores = data || [];
        }
        
        async function savePracticalScore(userId, courseId, lessonId, score, notes) {
            await supabaseClient.from('practical_scores').insert({ user_id: userId, course_id: courseId, lesson_id: lessonId, score, notes, evaluated_by: currentUser.id });
            await loadPracticalScores();
        }
        
        function getQuizScore(userId, courseId, lessonId) {
            return localStorage.getItem(`quiz_${userId}_${courseId}_${lessonId}`);
        }
        
        function getAverageScore(userId, courseId) {
            const course = coursesData.find(c => c.id === courseId);
            if (!course) return 0;
            let total = 0, count = 0;
            for (let i = 0; i < (course.lessons || []).length; i++) {
                const quizScore = getQuizScore(userId, courseId, i);
                if (quizScore) { total += parseInt(quizScore); count++; }
            }
            return count > 0 ? Math.round(total / count * 10) : 0;
        }
        
        // ======================== AKUNTANSI & PAJAK ========================
        async function getFinancialData() {
            const { data: approvedUsers } = await supabaseClient.from('profiles').select('*').eq('status', 'approved');
            const totalRevenue = (approvedUsers || []).reduce((sum, u) => sum + (u.price_paid || 0), 0);
            const { data: approvedWithdraws } = await supabaseClient.from('withdraw_requests').select('*').eq('status', 'approved');
            const totalCommission = (approvedWithdraws || []).reduce((sum, w) => sum + (w.amount || 0), 0);
            const { data: topups } = await supabaseClient.from('transactions').select('*').eq('type', 'topup');
            const totalTopups = (topups || []).reduce((sum, t) => sum + (t.amount || 0), 0);
            const netProfit = totalRevenue + totalTopups - totalCommission;
            const taxAmount = netProfit * (settings.taxRate / 100);
            return { totalRevenue, totalTopups, totalCommission, netProfit, taxAmount };
        }

            const { totalRevenue, totalTopups, totalCommission, netProfit, taxAmount } = await getFinancialData();

        }

            <div id="practicalLessonDiv"></div><div id="practicalForm" style="display:none;"><div class="form-group"><label>Nilai (0-100)</label><input type="number" id="practicalScore" min="0" max="100"></div>
            <div class="form-group"><label>Catatan</label><textarea id="practicalNotes" rows="3"></textarea></div><button id="savePracticalBtn" class="btn-success">💾 Simpan Nilai</button></div>
            <h3>📊 Daftar Nilai Praktik</h3><div id="practicalList"></div><button id="backBtn" class="btn-back">Kembali</button></div>`;
            document.getElementById("adminContent").innerHTML = html;
            document.getElementById("backBtn").onclick = () => renderAdminDashboard();
            
            function loadLessons() {
                let courseId = document.getElementById("practicalCourseId").value;
                let course = coursesData.find(c => c.id == courseId);
                if (course) {
                    document.getElementById("practicalLessonDiv").innerHTML = `<div class="form-group"><label>Materi</label><select id="practicalLessonIdx"><option value="">-- Pilih Materi --</option>${(course.lessons || []).map((l, i) => `<option value="${i}">${i+1}. ${l.title}</option>`).join('')}</select></div>`;
                    document.getElementById("practicalForm").style.display = "block";
                }
            }
            document.getElementById("practicalUserId").onchange = loadLessons;
            document.getElementById("practicalCourseId").onchange = loadLessons;
            document.getElementById("savePracticalBtn").onclick = async () => {
                let userId = document.getElementById("practicalUserId").value;
                let courseId = document.getElementById("practicalCourseId").value;
                let lessonIdx = parseInt(document.getElementById("practicalLessonIdx").value);
                let score = parseInt(document.getElementById("practicalScore").value);
                let notes = document.getElementById("practicalNotes").value;
                if (!userId || !courseId || isNaN(lessonIdx) || isNaN(score)) { alert("Lengkapi semua data!"); return; }
                await savePracticalScore(userId, courseId, lessonIdx, score, notes);
                alert("✅ Nilai praktik disimpan!");
                renderAdminPracticalExams();
            };
            
            function renderPracticalList() {
                let container = document.getElementById("practicalList");
                container.innerHTML = "<table class='mufradat-table'><thead>运转<th>Peserta</th><th>Kursus</th><th>Materi</th><th>Nilai</th><th>Catatan</th></tr></thead><tbody>";
                practicalScores.forEach(p => {
                    let course = coursesData.find(c => c.id == p.course_id);
                    let lesson = course?.lessons[p.lesson_id];
                    container.innerHTML += `<tr>
                        <td>${p.profiles?.full_name || '-'}ER20</div></td>
                        <td>${course?.title || '-'}ER20</div></td>
                        <td>${lesson?.title || '-'}ER20</div></td>
                        <td><strong>${p.score}/100</strong>ER20</div></td>
                        <td>${p.notes || '-'}ER20</div></td>
                    </tr>`;
                });
                container.innerHTML += "</tbody></table>";
                if (practicalScores.length === 0) container.innerHTML = "<p>Belum ada nilai praktik.</p>";
            }
            renderPracticalList();
        }
        
        async function renderStudentDashboard() {
            const { data: profiles } = await supabaseClient.from('profiles').select('*');
            let html = `<div class="card"><h2>📋 Daftar Peserta (${profiles?.length || 0})</h2>
            <div style="overflow-x:auto;"><table class="mufradat-table"><thead>运转<th>Nama</th><th>Email</th><th>WhatsApp</th><th>Paket</th><th>Status</th><th>Saldo</th><th>Aksi</th></tr></thead><tbody>${(profiles || []).map(p => `<tr>
                <td>${escapeHtml(p.full_name)}</div></td>
                <td>${p.user_id}</div></td>
                <td>${p.phone || '-'}</div></td>
                <td>${p.is_bundle ? 'Bundle' : (coursesData.find(c => c.id === p.selected_course)?.title || '-')}</div></td>
                <td><span class="badge ${p.status === 'approved' ? 'badge-blue' : 'badge-gold'}">${p.status || 'pending'}</span></div></td>
                <td>${formatRupiah(p.commission || 0)}</div></td>
                <td><button class="btn-add-balance" data-user="${p.user_id}" data-name="${escapeHtml(p.full_name)}" style="background:#3498db; padding:5px 10px;">💰 Top Up</button> <button class="btn-ban" data-user="${p.user_id}" style="background:#e74c3c; padding:5px 10px;">🚫 Ban</button></div></td>
                `).join('')}</tbody></table></div>
            <button id="backBtn" class="btn-back">Kembali</button></div>`;
            document.getElementById("adminContent").innerHTML = html;
            document.getElementById("backBtn").onclick = () => renderAdminDashboard();
            document.querySelectorAll(".btn-ban").forEach(btn => { btn.onclick = async () => { if(confirm("Ban user?")) { await supabaseClient.from('profiles').update({ status: 'banned', account_status: 'banned' }).eq('user_id', btn.getAttribute("data-user")); alert("✅ User dibanned!"); renderStudentDashboard(); } }; });
            document.querySelectorAll(".btn-add-balance").forEach(btn => { btn.onclick = async () => { let amt = prompt(`Tambah saldo untuk ${btn.getAttribute("data-name")}:`, "100000"); if(amt) { let amount = parseInt(amt); let { data: profile } = await supabaseClient.from('profiles').select('commission').eq('user_id', btn.getAttribute("data-user")).single(); let newBalance = (profile?.commission || 0) + amount; await supabaseClient.from('profiles').update({ commission: newBalance }).eq('user_id', btn.getAttribute("data-user")); alert(`✅ Top up ${formatRupiah(amount)} berhasil!`); renderStudentDashboard(); } }; });
        }
        
        async function renderCertificateSettings() {
            await loadAppSettings();
            let html = `<div class="card"><h2>🎓 Pengaturan Sertifikat</h2><form id="certSettingsForm">
                <div class="form-group"><label>🏫 Nama Lembaga</label><input type="text" id="institutionName" value="${escapeHtml(appSettings.institution_name || 'ALFARUQ ONLINE COURSE')}"></div>
                <div class="form-group"><label>👨‍🏫 Nama Pengajar</label><input type="text" id="teacherName" value="${escapeHtml(appSettings.teacher_name || 'Ustadz Ahmad Fauzi, Lc.')}"></div>
                <div class="form-group"><label>👔 Nama Direktur</label><input type="text" id="directorName" value="${escapeHtml(appSettings.director_name || 'Dr. H. Muhammad Ramli, M.Ag.')}"></div>
                <button type="submit" class="btn-success">💾 Simpan</button>
                <button type="button" id="backBtn" class="btn-back">Kembali</button>
            </form>
            <hr><h3>📄 Preview Sertifikat</h3>
            <div style="border:2px solid #f4a261; border-radius:20px; padding:20px; background:white; max-width:500px; margin:0 auto; text-align:center;">
            <div style="font-size:1.2rem;">🎓 ${escapeHtml(document.getElementById("institutionName")?.value || appSettings.institution_name || 'ALFARUQ')}</div>
            <div style="margin:15px 0;"><div>Diberikan kepada:</div><div style="font-size:1.5rem; font-weight:bold;">[Nama Peserta]</div><div style="font-size:1.2rem; color:#e67e22;">[Nama Kursus]</div></div>
            <div style="display:flex; justify-content:space-between;">${escapeHtml(appSettings.teacher_name || 'Pengajar')} / ${escapeHtml(appSettings.director_name || 'Direktur')}</div></div></div>`;
            document.getElementById("adminContent").innerHTML = html;
            document.getElementById("backBtn").onclick = () => renderAdminDashboard();
            document.getElementById("certSettingsForm").onsubmit = async (e) => {
                e.preventDefault();
                await supabaseClient.from('app_settings').upsert({ key: 'institution_name', value: document.getElementById("institutionName").value });
                await supabaseClient.from('app_settings').upsert({ key: 'teacher_name', value: document.getElementById("teacherName").value });
                await supabaseClient.from('app_settings').upsert({ key: 'director_name', value: document.getElementById("directorName").value });
                alert("✅ Pengaturan sertifikat disimpan!");
                renderCertificateSettings();
            };
        }
        
        // ======================== ROUTER ========================
        async function route() {
            let hash = window.location.hash.slice(1);
            if (!supabaseClient) {
                const initSuccess = await initSupabase();
                if (!initSuccess) return;
            }
            if (hash === "" || hash === "landing") renderLandingPage();
            else if (hash === "register") renderRegisterForm(false);
            else if (hash === "register-bundle") renderRegisterForm(true);
            else if (hash === "login") renderLoginForm();
            else if (hash === "forgot-password") renderForgotPassword();
            else if (hash === "dashboard") { if (currentUser) renderUserDashboard(); else window.location.hash = "#login"; }
            else if (hash === "admin") renderAdminLogin();
            else if (hash === "admin-dashboard") { if (isAdmin) renderAdminDashboard(); else { alert("Akses ditolak. Anda bukan admin."); window.location.hash = "#landing"; } }
            else renderLandingPage();
        }
        
        window.addEventListener("hashchange", route);
        let savedDarkMode = localStorage.getItem("darkMode");
        if (savedDarkMode === "true") document.documentElement.setAttribute("data-theme", "dark");
        route();
    </script>
</body>
</html>
