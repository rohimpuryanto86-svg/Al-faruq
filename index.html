                if (m === '>') return '&gt;';

        async function loadUserProfile() {
            if (!currentUser) return;
            const { data } = await supabaseClient.from('profiles').select('*').eq('user_id', currentUser.id).single();

        async function loadCourses() {

        async function saveCourse(course) {
            await supabaseClient.from('courses').upsert({

        function isCourseAccessible(courseId) {
            if (isAdmin) return true;
            if (currentUser?.isBundle) return true;
            if (currentUser?.selectedCourse === courseId) return true;
            if (currentUser?.purchasedCourses?.includes(courseId)) return true;
            return false;
        }
        
        async function purchaseCourseWithWallet(courseId, price) {
            if (currentUser.commission < price) {
                alert(`Saldo tidak cukup! Saldo Anda: ${formatRupiah(currentUser.commission)}`);
                return false;
            }
            
            const course = coursesData.find(c => c.id === courseId);
            const confirmBuy = confirm(`Beli ${course?.title} seharga ${formatRupiah(price)}?`);
            if (!confirmBuy) return false;
            
            const newBalance = currentUser.commission - price;
            await supabaseClient.from('profiles').update({ 
                commission: newBalance,
                purchased_courses: [...(currentUser.purchasedCourses || []), courseId]
            }).eq('user_id', currentUser.id);
            
            currentUser.commission = newBalance;
            currentUser.purchasedCourses = [...(currentUser.purchasedCourses || []), courseId];
            
            alert(`Berhasil membeli kursus! Saldo Anda sekarang: ${formatRupiah(newBalance)}`);
            return true;
        }

        function updateLandingCountdown() {
            let el = document.getElementById("landingCountdown");
            if (!el) return;
            if (settings.earlyBirdEnabled && new Date() < new Date(settings.earlyBirdEndDate)) {
                let diff = new Date(settings.earlyBirdEndDate) - new Date();
                if (diff > 0) {
                    let d = Math.floor(diff / 86400000);
                    let h = Math.floor((diff % 86400000) / 3600000);
                    let m = Math.floor((diff % 3600000) / 60000);
                    let s = Math.floor((diff % 60000) / 1000);
                    el.innerHTML = `Diskon ${settings.earlyBirdDiscount}% berlaku ${d}d ${h}h ${m}m ${s}s lagi!`;
                    return;
                }
            }
            el.innerHTML = "Early Bird berakhir! Cek harga normal.";
        }

        function toggleDarkMode() {

                lesson.quiz.forEach((q, idx) => {
                    let sel = document.querySelector(`input[name="q${idx}"]:checked`);
                    if (sel && parseInt(sel.value) === q.jawab) score++;
                });
                localStorage.setItem(`quiz_${currentUser.id}_${currentCourseForUser.id}_${selectedLessonIndex}`, score);
                if (score >= 7) {
                    let completed = currentUser.completedLessons[currentCourseForUser.id] || [];

                        completed.push(selectedLessonIndex);

                }
            };
        }

                        <label>Preview Harga Setelah Diskon</label>
                        <div style="background: #f0f0f0; padding: 15px; border-radius: 12px;">
                            <p><strong>1 Kursus:</strong> <span style="text-decoration:line-through;">Rp 200.000</span> → <strong>${formatRupiah(getDiscountedPrice(200000))}</strong></p>
                            <p><strong>Bundle:</strong> <span style="text-decoration:line-through;">Rp 800.000</span> → <strong>${formatRupiah(getDiscountedPrice(800000))}</strong></p>
                        </div>
                    </div>
                    <button type="submit" class="btn-success">Simpan Pengaturan</button>
                    <button type="button" id="backBtn" class="btn-back">Kembali</button>
                </form>
            </div>
            <div class="card">
                <h3>Countdown Status</h3>
                <div id="earlyBirdStatus" style="padding: 10px; border-radius: 12px;"></div>
            </div>`;
            document.getElementById("adminContent").innerHTML = html;
            
            function updateStatus() {
                let statusDiv = document.getElementById("earlyBirdStatus");
                if (!statusDiv) return;
                let isEnabled = document.getElementById("earlyBirdEnabled")?.value === "true";
                let endDate = new Date(document.getElementById("earlyBirdEndDate")?.value);
                let now = new Date();
                let discount = document.getElementById("earlyBirdDiscount")?.value || 0;
                if (!isEnabled) {
                    statusDiv.innerHTML = `<div class="alert-warning">Early Bird NONAKTIF. Harga normal.</div>`;
                } else if (now > endDate) {
                    statusDiv.innerHTML = `<div class="alert-danger">Early Bird telah BERAKHIR pada ${endDate.toLocaleString()}.</div>`;
                } else {
                    let diff = endDate - now;
                    let days = Math.floor(diff / 86400000);
                    let hours = Math.floor((diff % 86400000) / 3600000);
                    let minutes = Math.floor((diff % 3600000) / 60000);
                    let seconds = Math.floor((diff % 60000) / 1000);
                    statusDiv.innerHTML = `<div class="alert-success">Early Bird AKTIF! Diskon ${discount}% berlaku: ${days} hari ${hours} jam ${minutes} menit ${seconds} detik lagi!</div>`;
                }
            }
            let interval = setInterval(updateStatus, 1000);
            updateStatus();
            document.getElementById("backBtn").onclick = () => {
                clearInterval(interval);
                renderAdminDashboard();
            };
            document.getElementById("earlyBirdForm").onsubmit = async (e) => {
                e.preventDefault();
                let newEnabled = document.getElementById("earlyBirdEnabled").value === "true";
                let newDiscount = parseInt(document.getElementById("earlyBirdDiscount").value);
                let newEndDate = document.getElementById("earlyBirdEndDate").value;
                await supabaseClient.from('app_settings').upsert({ key: 'early_bird_enabled', value: String(newEnabled) });
                await supabaseClient.from('app_settings').upsert({ key: 'early_bird_discount', value: String(newDiscount) });
                await supabaseClient.from('app_settings').upsert({ key: 'early_bird_end_date', value: newEndDate });
                settings.earlyBirdEnabled = newEnabled;
                settings.earlyBirdDiscount = newDiscount;
                settings.earlyBirdEndDate = newEndDate;
                alert("Pengaturan Early Bird disimpan!");
                clearInterval(interval);
                renderEarlyBirdSettings();
            };
        }
        
        // ======================== ADMIN PANEL ========================
        function renderAdminLogin() {
            let html = `<div class="card">
                <h2>Admin Login</h2>
                <form id="adminForm">
                    <div class="form-group"><label>Email</label><input type="email" id="adminEmail"></div>
                    <div class="form-group"><label>Password</label><input type="password" id="adminPass"></div>
                    <button type="submit">Login</button>
                    <button onclick="window.location.hash='#landing'" class="btn-outline">Kembali</button>
                </form>
            </div>`;
            document.getElementById("appRoot").innerHTML = html;
            document.getElementById("adminForm").onsubmit = async (e) => {
                e.preventDefault();
                let email = document.getElementById("adminEmail").value;
                let password = document.getElementById("adminPass").value;
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) { alert("Login gagal: " + error.message); return; }
                currentUser = data.user;
                await loadUserProfile();
                await checkAdminStatus();
                if (isAdmin) { 
                    window.location.hash = "#admin-dashboard"; 
                } else { 
                    alert("Akun Anda bukan admin."); 
                    await supabaseClient.auth.signOut(); 
                }
            };
        }
        
        async function renderAdminDashboard() {
            const { data: pendingUsers } = await supabaseClient.from('profiles').select('*').eq('status', 'pending');
            const pendingWithdraws = withdrawRequests.filter(w => w.status === 'pending');
            
            let html = `<div class="tabs">
                <div class="tab" id="logoutAdmin">Logout</div>
                <div class="tab active">Admin Panel</div>
                <div class="tab" id="editCourseUITab">Edit Kursus (UI Form)</div>
                <div class="tab" id="studentMgmtTab">Manajemen Peserta</div>
                <div class="tab" id="earlyBirdTab">Early Bird</div>
            </div>
            <div id="adminContent">
                <div class="card">
                    <h2>Pendaftaran Menunggu (${pendingUsers?.length || 0})</h2>
                    ${(pendingUsers || []).map(u => `<div style="border-bottom:1px solid #eee; padding:10px;">
                        <strong>${u.full_name}</strong> (${u.email})<br>
                        Paket: ${u.is_bundle ? 'Bundle' : (coursesData.find(c => c.id === u.selected_course)?.title || '-')}<br>
                        <button class="btn-approve" data-user="${u.user_id}" style="background:#27ae60;">Setujui</button>
                        <button class="btn-reject" data-user="${u.user_id}" style="background:#e74c3c;">Tolak</button>
                    </div>`).join('') || '<p>Tidak ada pendaftaran pending.</p>'}
                </div>
                <div class="card">
                    <h2>Request Withdraw (${pendingWithdraws.length})</h2>
                    ${pendingWithdraws.map(w => `<div style="border-bottom:1px solid #eee; padding:10px;">
                        <strong>${w.user_name || w.user_id}</strong> - ${formatRupiah(w.amount)}<br>
                        <button class="approve-withdraw" data-id="${w.id}" style="background:#27ae60;">Setujui</button>
                        <button class="reject-withdraw" data-id="${w.id}" style="background:#e74c3c;">Tolak</button>
                    </div>`).join('') || '<p>Tidak ada request withdraw.</p>'}
                </div>
            </div>
            <button id="backBtn" class="btn-back">Kembali ke Beranda</button>`;
            document.getElementById("appRoot").innerHTML = html;
            
            document.getElementById("logoutAdmin").onclick = async () => { 
                await supabaseClient.auth.signOut(); 
                window.location.hash = "#landing";
            };
            document.getElementById("backBtn").onclick = () => window.location.hash = "#landing";
            document.getElementById("editCourseUITab").onclick = () => renderCourseUIEditor();
            document.getElementById("studentMgmtTab").onclick = () => renderStudentDashboard();
            document.getElementById("earlyBirdTab").onclick = () => renderEarlyBirdSettings();
            
            document.querySelectorAll(".btn-approve").forEach(btn => { btn.onclick = async () => { 
                await supabaseClient.from('profiles').update({ status: 'approved' }).eq('user_id', btn.getAttribute("data-user")); 
                alert("User disetujui!"); 
                renderAdminDashboard(); 
            }; });
            document.querySelectorAll(".btn-reject").forEach(btn => { btn.onclick = async () => { 
                if(confirm("Tolak pendaftaran user ini?")) { 
                    await supabaseClient.from('profiles').delete().eq('user_id', btn.getAttribute("data-user")); 
                    alert("User ditolak!"); 
                    renderAdminDashboard(); 
                } 
            }; });
            document.querySelectorAll(".approve-withdraw").forEach(btn => { btn.onclick = async () => { 
                await approveWithdraw(btn.getAttribute("data-id")); 
                renderAdminDashboard(); 
            }; });
            document.querySelectorAll(".reject-withdraw").forEach(btn => { btn.onclick = async () => { 
                await rejectWithdraw(btn.getAttribute("data-id")); 
                renderAdminDashboard(); 
            }; });
        }
        
        async function renderCourseUIEditor() {
            await loadCourses();
            let html = `<div class="card">
                <h2>Edit Kursus via UI Form</h2>
                <div class="course-grid">
                    ${coursesData.map(course => `<div class="course-card">
                        <div class="course-icon">${course.icon || 'book'}</div>
                        <div class="course-title">${course.title}</div>
                        <button class="edit-course-info" data-id="${course.id}" style="background:#27ae60;">Edit Info & Grup</button>
                        <button class="edit-lessons" data-id="${course.id}" style="background:#3498db;">Edit Materi</button>
                    </div>`).join('')}
                </div>
                <button id="backBtn" class="btn-back">Kembali</button>
            </div>`;
            document.getElementById("adminContent").innerHTML = html;
            document.getElementById("backBtn").onclick = () => renderAdminDashboard();
            document.querySelectorAll(".edit-course-info").forEach(btn => { btn.onclick = () => { 
                editingCourseId = btn.getAttribute("data-id"); 
                renderEditCourseInfo(); 
            }; });
            document.querySelectorAll(".edit-lessons").forEach(btn => { btn.onclick = () => { 
                editingCourseId = btn.getAttribute("data-id"); 
                renderLessonsManager(); 
            }; });
        }
        
        async function renderEditCourseInfo() {
            let course = coursesData.find(c => c.id == editingCourseId);
            if (!course) return;
            let html = `<div class="card">
                <h2>Edit Info & Grup Telegram: ${course.title}</h2>
                <form id="editCourseInfoForm">
                    <div class="form-group"><label>Icon (emoji)</label><input type="text" id="courseIcon" value="${course.icon || 'book'}"></div>
                    <div class="form-group"><label>Judul</label><input type="text" id="courseTitle" value="${course.title}" required></div>
                    <div class="form-group"><label>Deskripsi</label><textarea id="courseDesc" rows="3">${course.description || ''}</textarea></div>
                    <div class="form-group"><label>Harga</label><input type="number" id="coursePrice" value="${course.price || 200000}"></div>
                    <hr>
                    <h3>Pengaturan Grup Telegram</h3>
                    <div class="form-group"><label>Link Grup Diskusi & Tugas</label><input type="text" id="telegramGroup" value="${course.telegram_group || ''}" placeholder="https://t.me/nama_grup"></div>
                    <button type="submit" class="btn-success">Simpan</button>
                    <button type="button" id="backBtn" class="btn-back">Kembali</button>
                </form>
            </div>`;
            document.getElementById("adminContent").innerHTML = html;
            document.getElementById("backBtn").onclick = () => renderCourseUIEditor();
            document.getElementById("editCourseInfoForm").onsubmit = async (e) => {
                e.preventDefault();
                course.icon = document.getElementById("courseIcon").value;
                course.title = document.getElementById("courseTitle").value;
                course.desc = document.getElementById("courseDesc").value;
                course.price = parseInt(document.getElementById("coursePrice").value);
                course.telegram_group = document.getElementById("telegramGroup").value;
                await saveCourse(course);
                alert("Info kursus dan grup Telegram disimpan!");
                renderCourseUIEditor();
            };
        }
        
        async function renderLessonsManager() {
            let course = coursesData.find(c => c.id == editingCourseId);
            if (!course) return;
            let html = `<div class="card">
                <h2>Materi: ${course.title}</h2>
                <div class="lesson-list">
                    ${(course.lessons || []).map((lesson, idx) => `<div class="lesson-item" data-idx="${idx}">
                        <div><strong>${idx+1}. ${lesson.title}</strong></div>
                        <div><button class="edit-lesson" data-idx="${idx}" style="background:#3498db;">Edit</button>
                        <button class="delete-lesson" data-idx="${idx}" style="background:#e74c3c;">Hapus</button></div>
                    </div>`).join('')}
                </div>
                <div class="admin-menu">
                    <button id="addLessonBtn" class="btn-success">+ Tambah Materi</button>
                    <button id="backBtn" class="btn-back">Kembali</button>
                </div>
            </div>`;
            document.getElementById("adminContent").innerHTML = html;
            document.getElementById("backBtn").onclick = () => renderCourseUIEditor();
            document.getElementById("addLessonBtn").onclick = () => renderAddLessonForm();
            document.querySelectorAll(".edit-lesson").forEach(btn => { btn.onclick = () => { 
                editingLessonIndex = parseInt(btn.getAttribute("data-idx")); 
                renderEditLessonForm(); 
            }; });
            document.querySelectorAll(".delete-lesson").forEach(btn => { btn.onclick = async () => { 
                let idx = parseInt(btn.getAttribute("data-idx")); 
                if(confirm(`Hapus materi "${course.lessons[idx].title}"?`)) { 
                    course.lessons.splice(idx, 1); 
                    await saveCourse(course); 
                    renderLessonsManager(); 
                } 
            }; });
        }
        
        async function renderAddLessonForm() {
            let course = coursesData.find(c => c.id == editingCourseId);
            let newNumber = (course.lessons || []).length + 1;
            let html = `<div class="card">
                <h2>Tambah Materi Baru</h2>
                <form id="addLessonForm">
                    <div class="form-group"><label>Judul Materi</label><input type="text" id="lessonTitle" placeholder="Pertemuan ${newNumber}: ..." required></div>
                    <div class="form-group"><label>URL Video</label><input type="text" id="videoUrl" placeholder="https://www.youtube.com/embed/..."></div>
                    <button type="submit" class="btn-success">Tambah</button>
                    <button type="button" id="backBtn" class="btn-back">Kembali</button>
                </form>
            </div>`;
            document.getElementById("adminContent").innerHTML = html;
            document.getElementById("backBtn").onclick = () => renderLessonsManager();
            document.getElementById("addLessonForm").onsubmit = async (e) => {
                e.preventDefault();
                let newLesson = { 
                    number: newNumber, 
                    title: document.getElementById("lessonTitle").value, 
                    videoUrl: document.getElementById("videoUrl").value,
                    quiz: [{ q: "Contoh soal?", opt: ["A", "B", "C", "D"], jawab: 0 }]
                };
                course.lessons.push(newLesson);
                await saveCourse(course);
                alert(`Materi "${newLesson.title}" ditambahkan!`);
                renderLessonsManager();
            };
        }
        
        async function renderEditLessonForm() {
            let course = coursesData.find(c => c.id == editingCourseId);
            let lesson = course.lessons[editingLessonIndex];
            let html = `<div class="card">
                <h2>Edit Materi: ${lesson.title}</h2>
                <form id="editLessonForm">
                    <div class="form-group"><label>Judul</label><input type="text" id="lessonTitle" value="${lesson.title}" required></div>
                    <div class="form-group"><label>URL Video</label><input type="text" id="videoUrl" value="${lesson.videoUrl || ''}"></div>
                    <button type="submit" class="btn-success">Simpan</button>
                    <button type="button" id="backBtn" class="btn-back">Kembali</button>
                </form>
            </div>`;
            document.getElementById("adminContent").innerHTML = html;
            document.getElementById("backBtn").onclick = () => renderLessonsManager();
            document.getElementById("editLessonForm").onsubmit = async (e) => {
                e.preventDefault();
                lesson.title = document.getElementById("lessonTitle").value;
                lesson.videoUrl = document.getElementById("videoUrl").value;
                await saveCourse(course);
                alert("Materi disimpan!");
                renderEditLessonForm();
            };
        }
        
        async function renderStudentDashboard() {
            const { data: profiles } = await supabaseClient.from('profiles').select('*');
            let html = `<div class="card">
                <h2>Daftar Peserta (${profiles?.length || 0} orang)</h2>
                <table class="commission-table">
                    <thead><tr><th>Nama</th><th>Email</th><th>WhatsApp</th><th>Paket</th><th>Status</th><th>Saldo</th><th>Aksi</th></tr></thead>
                    <tbody>${(profiles || []).map(p => `<tr>
                        <td>${escapeHtml(p.full_name)}</div></td>
                        <td>${p.user_id}</div></td>
                        <td>${p.phone || '-'}</div></td>
                        <td>${p.is_bundle ? 'Bundle' : (coursesData.find(c => c.id === p.selected_course)?.title || '-')}</div></td>
                        <td><span class="badge ${p.status === 'approved' ? 'badge-blue' : 'badge-gold'}">${p.status || 'pending'}</span></div></td>
                        <td>${formatRupiah(p.commission || 0)}</div></td>
                        <td><button class="btn-add-balance" data-user="${p.user_id}" data-name="${escapeHtml(p.full_name)}" style="background:#27ae60;">Top Up</button>
                        <button class="btn-ban" data-user="${p.user_id}" style="background:#e74c3c;">Ban</button></div></td>
                    `).join('')}</tbody>
                </table>
                <button id="backBtn" class="btn-back">Kembali</button>
            </div>`;
            document.getElementById("adminContent").innerHTML = html;
            document.getElementById("backBtn").onclick = () => renderAdminDashboard();
            document.querySelectorAll(".btn-ban").forEach(btn => { btn.onclick = async () => { 
                if(confirm("Ban user ini?")) { 
                    await supabaseClient.from('profiles').update({ status: 'banned' }).eq('user_id', btn.getAttribute("data-user")); 
                    alert("User dibanned!"); 
                    renderStudentDashboard(); 
                } 
            }; });
            document.querySelectorAll(".btn-add-balance").forEach(btn => { btn.onclick = async () => { 
                let amt = prompt(`Tambah saldo untuk ${btn.getAttribute("data-name")}:`, "100000"); 
                if(amt) { 
                    let amount = parseInt(amt); 
                    let { data: profile } = await supabaseClient.from('profiles').select('commission').eq('user_id', btn.getAttribute("data-user")).single(); 
                    let newBalance = (profile?.commission || 0) + amount; 
                    await supabaseClient.from('profiles').update({ commission: newBalance }).eq('user_id', btn.getAttribute("data-user")); 
                    alert(`Top up ${formatRupiah(amount)} berhasil!`); 
                    renderStudentDashboard(); 
                } 
            }; });
        }
        
        // ======================== ROUTER ========================
        async function route() {
            let hash = window.location.hash.slice(1);
            if (!supabaseClient) {
                const initSuccess = await initSupabase();
                if (!initSuccess) return;
            }
            if (hash === "" || hash === "landing") renderLandingPage();
            else if (hash === "register") renderRegisterForm(false);
            else if (hash === "register-bundle") renderRegisterForm(true);
            else if (hash === "login") renderLoginForm();
            else if (hash === "forgot-password") renderForgotPassword();
            else if (hash === "dashboard") { 
                if (currentUser) renderUserDashboard(); 
                else window.location.hash = "#login"; 
            }
            else if (hash === "admin") renderAdminLogin();
            else if (hash === "admin-dashboard") { 
                if (isAdmin) renderAdminDashboard(); 
                else { alert("Akses ditolak. Anda bukan admin."); window.location.hash = "#landing"; } 
            }
            else renderLandingPage();
        }
        
        window.addEventListener("hashchange", route);
        let savedDarkMode = localStorage.getItem("darkMode");
        if (savedDarkMode === "true") document.documentElement.setAttribute("data-theme", "dark");
        route();
    </script>
</body>
</html>
