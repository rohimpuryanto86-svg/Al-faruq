            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(amount);
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                if (m === '"') return '&quot;';
                if (m === "'") return '&#39;';
                return m;
            });
        }
        
        function getDiscountedPrice(price) {
            if (settings.earlyBirdEnabled && new Date() < new Date(settings.earlyBirdEndDate)) {

        async function loadUserProfile() {
            if (!currentUser) return;
            const { data, error } = await supabaseClient.from('profiles').select('*').eq('user_id', currentUser.id).single();
            if (data) {
                currentUser.profile = data;
                currentUser.name = data.full_name;
                currentUser.status = data.status || 'pending'; // FIX: tambah status
                currentUser.walletBalance = data.wallet_balance || 0;

                currentUser.completedLessons = {};

                await loadUserBadges();
                await loadScores();
            }

        async function loadUserProgress() {
            const { data } = await supabaseClient.from('user_progress').select('*').eq('user_id', currentUser.id);
            if (data) {
                data.forEach(p => { currentUser.completedLessons[p.course_id] = p.completed_lessons || []; });
            }
        }
        
        async function loadUserBadges() {
            const { data } = await supabaseClient.from('user_badges').select('badge_id').eq('user_id', currentUser.id);
            currentUser.earnedBadges = (data || []).map(b => b.badge_id);
        }
        
        async function loadScores() {
            const { data } = await supabaseClient.from('scores').select('*').eq('user_id', currentUser.id);
            currentUser.scores = data || [];

        async function checkAdminStatus() {
            const { data } = await supabaseClient.from('user_roles').select('is_admin').eq('user_id', currentUser.id).single();
            isAdmin = data?.is_admin === true;
            return isAdmin;
        }
        
        async function loadCourses() {
            const { data } = await supabaseClient.from('courses').select('*').order('id');
            if (data && data.length > 0) {
                coursesData = data.map(c => ({ ...c, lessons: c.lessons || [], price: c.price || 200000, telegram_group: c.telegram_group || '' }));

        async function purchaseCourse(courseId, price) {
            if (currentUser.walletBalance < price) {
                alert(`Saldo tidak cukup! Saldo: ${formatRupiah(currentUser.walletBalance)}`);
                return false;

            const course = coursesData.find(c => c.id === courseId);

        async function uploadToImgBB(file) {
            try {
                // Konversi file ke base64
                const base64 = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result.split(",")[1]);
                    reader.onerror = () => reject(new Error("Gagal membaca file"));
                    reader.readAsDataURL(file);
                });
                // Kirim ke Edge Function api-proxy
                const { data, error } = await supabaseClient.functions.invoke("api-proxy", {
                    body: { action: "upload_image", payload: { base64Image: base64 } }
                });
                if (error) throw new Error(error.message);
                if (!data?.url) throw new Error("URL tidak ditemukan");
                return data.url;
            } catch(e) {
                console.warn("Upload ImgBB gagal:", e.message);
                alert("Upload bukti bayar gagal: " + e.message);
                return "https://via.placeholder.com/300?text=Bukti+Bayar";
            }
        }
        
        async function checkAndUpdateReferralStatus() {
            let canRefer = false;
            for (const course of coursesData) {
                if (isCourseOwned(course.id)) {
                    let completed = currentUser.completedLessons[course.id] || [];
                    let totalLessons = (course.lessons || []).length;
                    if (completed.length === totalLessons && totalLessons > 0) {
                        let totalScore = 0, quizCount = 0;
                        for (let i = 0; i < totalLessons; i++) {
                            let quizScore = localStorage.getItem(`quiz_${currentUser.id}_${course.id}_${i}`);
                            if (quizScore) { totalScore += parseInt(quizScore); quizCount++; }
                        }
                        let avgScore = quizCount > 0 ? (totalScore / quizCount) * 10 : 0;
                        if (avgScore >= 70) { canRefer = true; break; }
                    }
                }
            }
            if (currentUser.canRefer !== canRefer) {
                await supabaseClient.from('profiles').update({ can_refer: canRefer }).eq('user_id', currentUser.id);
                currentUser.canRefer = canRefer;
            }
            return canRefer;
        }
        
        function getCourseProgress(courseId) {
            let completed = currentUser.completedLessons[courseId] || [];
            let total = coursesData.find(c => c.id === courseId)?.lessons?.length || 1;
            return { completed: completed.length, total, percent: (completed.length / total) * 100 };
        }
        
        function getOverallProgress() {
            let totalCompleted = 0, totalLessons = 0;
            coursesData.forEach(course => {
                if (isCourseOwned(course.id)) {
                    let completed = currentUser.completedLessons[course.id] || [];
                    totalCompleted += completed.length;
                    totalLessons += (course.lessons || []).length;
                }
            });
            return { completed: totalCompleted, total: totalLessons, percent: totalLessons > 0 ? (totalCompleted / totalLessons) * 100 : 0 };
        }

                await savePromoCode({ code: document.getElementById("code").value.toUpperCase(), discount_percent: parseInt(document.getElementById("discount").value), is_active: true });
                alert("Diskon ditambahkan!");
                renderPromoManager();
            };
        }
        
        function renderEditPromoForm(id, code, discount, isActive) {
            let html = `
                <div class="card">
                    <h2>Edit Diskon</h2>
                    <form id="editPromoForm">
                        <div class="form-group"><label>Kode Promo</label><input type="text" id="code" value="${escapeHtml(code)}" required></div>
                        <div class="form-group"><label>Diskon (%)</label><input type="number" id="discount" min="0" max="100" value="${discount}" required></div>
                        <div class="form-group"><label>Status</label>
                            <select id="isActive">
                                <option value="true" ${isActive ? 'selected' : ''}>Aktif</option>
                                <option value="false" ${!isActive ? 'selected' : ''}>Nonaktif</option>
                            </select>
                        </div>
                        <button type="submit" class="btn-success">Simpan</button>
                        <button type="button" id="backBtn" class="btn-back">Kembali</button>
                    </form>
                </div>
            `;
            document.getElementById("adminContent").innerHTML = html;
            document.getElementById("backBtn").onclick = () => renderPromoManager();
            document.getElementById("editPromoForm").onsubmit = async (e) => {
                e.preventDefault();
                await savePromoCode({ id: id, code: document.getElementById("code").value.toUpperCase(), discount_percent: parseInt(document.getElementById("discount").value), is_active: document.getElementById("isActive").value === 'true' });
                alert("Diskon diperbarui!");
                renderPromoManager();
            };
        }
        
        async function renderFinancialReport() {
            let { data: profiles } = await supabaseClient.from('profiles').select('*').eq('status', 'approved');
            let totalRevenue = (profiles || []).reduce((sum, p) => sum + (p.price_paid || 0), 0);
            let totalCommission = (profiles || []).reduce((sum, p) => sum + (p.commission || 0), 0);
            let netProfit = totalRevenue - totalCommission;
            let taxAmount = netProfit * 0.005; // 0.5% PPh Final
            let html = `
                <div class="card">
                    <h2>Laporan Keuangan & Pajak</h2>
                    <div class="stats-grid">
                        <div class="stat-card"><div class="stat-number">${formatRupiah(totalRevenue)}</div><div>Total Pendapatan</div></div>
                        <div class="stat-card"><div class="stat-number">${formatRupiah(totalCommission)}</div><div>Total Komisi</div></div>
                        <div class="stat-card"><div class="stat-number">${formatRupiah(netProfit)}</div><div>Laba Kotor</div></div>
                        <div class="stat-card"><div class="stat-number">${formatRupiah(taxAmount)}</div><div>Pajak (0.5%)</div></div>
                        <div class="stat-card"><div class="stat-number">${formatRupiah(netProfit - taxAmount)}</div><div>Laba Bersih</div></div>
                    </div>
                    <button id="backBtn" class="btn-back">Kembali</button>
                </div>
            `;
            document.getElementById("adminContent").innerHTML = html;
            document.getElementById("backBtn").onclick = () => renderAdminDashboard();
        }
        
        async function renderAdminPracticalExams() {
            await loadPracticalScores();
            let users = await supabaseClient.from('profiles').select('user_id, full_name').eq('status', 'approved');
            let html = `
                <div class="card">
                    <h2>Input Nilai Praktik</h2>
                    <div class="form-group"><label>Pilih Peserta</label><select id="practicalUserId">${(users.data || []).map(u => `<option value="${u.user_id}">${u.full_name}</option>`).join('')}</select></div>
                    <div class="form-group"><label>Pilih Kursus</label><select id="practicalCourseId">${coursesData.map(c => `<option value="${c.id}">${c.title}</option>`).join('')}</select></div>
                    <div id="practicalLessonDiv"></div>
                    <div id="practicalForm" style="display:none;">
                        <div class="form-group"><label>Nilai (0-100)</label><input type="number" id="practicalScore" min="0" max="100"></div>
                        <div class="form-group"><label>Catatan</label><textarea id="practicalNotes" rows="3"></textarea></div>
                        <button id="savePracticalBtn" class="btn-success">Simpan Nilai</button>
                    </div>
                    <h3>Daftar Nilai Praktik</h3>
                    <div id="practicalList"></div>
                    <button id="backBtn" class="btn-back">Kembali</button>
                </div>
            `;
            document.getElementById("adminContent").innerHTML = html;
            document.getElementById("backBtn").onclick = () => renderAdminDashboard();
            
            function loadLessons() {
                let courseId = document.getElementById("practicalCourseId").value;
                let course = coursesData.find(c => c.id == courseId);
                if (course) {
                    document.getElementById("practicalLessonDiv").innerHTML = `<div class="form-group"><label>Materi</label><select id="practicalLessonIdx"><option value="">-- Pilih Materi --</option>${(course.lessons || []).map((l, i) => `<option value="${i}">${i+1}. ${l.title}</option>`).join('')}</select></div>`;
                    document.getElementById("practicalForm").style.display = "block";
                }
            }
            document.getElementById("practicalUserId").onchange = loadLessons;
            document.getElementById("practicalCourseId").onchange = loadLessons;
            loadLessons(); // FIX: auto-load on render so form is visible immediately
            document.getElementById("savePracticalBtn").onclick = async () => {
                let userId = document.getElementById("practicalUserId").value;
                let courseId = document.getElementById("practicalCourseId").value;
                let lessonIdx = parseInt(document.getElementById("practicalLessonIdx").value);
                let score = parseInt(document.getElementById("practicalScore").value);
                let notes = document.getElementById("practicalNotes").value;
                if (!userId || !courseId || isNaN(lessonIdx) || isNaN(score)) { alert("Lengkapi semua data!"); return; }
                await savePracticalScore(userId, courseId, lessonIdx, score, notes);
                alert("Nilai praktik disimpan!");
                renderAdminPracticalExams();
            };
            
            function renderPracticalList() {
                let container = document.getElementById("practicalList");
                container.innerHTML = "<table class='report-table'><thead><tr><th>Peserta</th><th>Kursus</th><th>Materi</th><th>Nilai</th><th>Catatan</th></tr></thead><tbody>";
                practicalScores.forEach(p => {
                    let course = coursesData.find(c => c.id == p.course_id);
                    let lesson = course?.lessons[p.lesson_id];
                    container.innerHTML += `<tr><td>${p.profiles?.full_name || '-'}</td><td>${course?.title || '-'}</td><td>${lesson?.title || '-'}</td><td><strong>${p.score}/100</strong></td><td>${p.notes || '-'}</td></tr>`;
                });
                container.innerHTML += "</tbody></table>";
                if (practicalScores.length === 0) container.innerHTML = "<p>Belum ada nilai praktik.</p>";
            }
            renderPracticalList();
        }
        
        async function renderStudentDashboard() {
            const { data: profiles } = await supabaseClient.from('profiles').select('*');
            let html = `
                <div class="card">
                    <h2>Daftar Peserta (${profiles?.length || 0})</h2>
                    <table class="report-table">
                        <thead><tr style="background:#1e6b3b; color:white;"><th>Nama</th><th>User ID</th><th>WhatsApp</th><th>Saldo</th><th>Komisi</th><th>Status</th><th>Aksi</th></tr></thead>
                        <tbody>
                            ${(profiles || []).map(p => `
                                <tr>
                                    <td>${escapeHtml(p.full_name)}</td>
                                    <td style="font-size:0.75rem;">${p.user_id}</td>
                                    <td>${p.phone || '-'}</td>
                                    <td>${formatRupiah(p.wallet_balance || 0)}</td>
                                    <td>${formatRupiah(p.commission || 0)}</td>
                                    <td><span style="background:${p.status === 'approved' ? '#27ae60' : p.status === 'banned' ? '#e74c3c' : '#f39c12'}; color:white; padding:3px 8px; border-radius:20px; font-size:0.75rem;">${p.status || 'pending'}</span></td>
                                    <td>
                                        <button class="btn-approve-user" data-id="${p.user_id}" style="background:#27ae60; padding:5px 10px;">Approve</button>
                                        <button class="btn-topup-user" data-id="${p.user_id}" data-name="${escapeHtml(p.full_name)}" style="background:#3498db; padding:5px 10px;">Top Up</button>
                                        <button class="btn-ban-user" data-id="${p.user_id}" style="background:#e74c3c; padding:5px 10px;">Ban</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    <button id="backBtn" class="btn-back">Kembali</button>
                </div>
            `;
            document.getElementById("adminContent").innerHTML = html;
            document.getElementById("backBtn").onclick = () => renderAdminDashboard();
            document.querySelectorAll(".btn-approve-user").forEach(btn => { btn.onclick = async () => { await supabaseClient.from('profiles').update({ status: 'approved' }).eq('user_id', btn.getAttribute("data-id")); alert("User disetujui!"); renderStudentDashboard(); }; });
            document.querySelectorAll(".btn-topup-user").forEach(btn => { btn.onclick = async () => { let amt = prompt(`Top up untuk ${btn.getAttribute("data-name")}:`, "100000"); if(amt) { let amount = parseInt(amt); let { data: profile } = await supabaseClient.from('profiles').select('wallet_balance').eq('user_id', btn.getAttribute("data-id")).single(); let newBalance = (profile?.wallet_balance || 0) + amount; await supabaseClient.from('profiles').update({ wallet_balance: newBalance }).eq('user_id', btn.getAttribute("data-id")); alert(`Top up ${formatRupiah(amount)} berhasil!`); renderStudentDashboard(); } }; });
            document.querySelectorAll(".btn-ban-user").forEach(btn => { btn.onclick = async () => { if(confirm("Ban user ini?")) { await supabaseClient.from('profiles').update({ status: 'banned', account_status: 'banned' }).eq('user_id', btn.getAttribute("data-id")); alert("User dibanned!"); renderStudentDashboard(); } }; });
        }
        
        async function renderCertificateSettings() {
            await loadAppSettings();
            let html = `
                <div class="card">
                    <h2>Pengaturan Sertifikat</h2>
                    <form id="certSettingsForm">
                        <div class="form-group"><label>Nama Lembaga</label><input type="text" id="institutionName" value="${escapeHtml(appSettings.institution_name || 'ALFARUQ ONLINE COURSE')}"></div>
                        <div class="form-group"><label>Nama Pengajar</label><input type="text" id="teacherName" value="${escapeHtml(appSettings.teacher_name || 'Ustadz Ahmad Fauzi, Lc.')}"></div>
                        <div class="form-group"><label>Nama Direktur</label><input type="text" id="directorName" value="${escapeHtml(appSettings.director_name || 'Dr. H. Muhammad Ramli, M.Ag.')}"></div>
                        <button type="submit" class="btn-success">Simpan</button>
                        <button type="button" id="backBtn" class="btn-back">Kembali</button>
                    </form>
                </div>
            `;
            document.getElementById("adminContent").innerHTML = html;
            document.getElementById("backBtn").onclick = () => renderAdminDashboard();
            document.getElementById("certSettingsForm").onsubmit = async (e) => {
                e.preventDefault();
                await supabaseClient.from('app_settings').upsert({ key: 'institution_name', value: document.getElementById("institutionName").value }, { onConflict: 'key' });
                await supabaseClient.from('app_settings').upsert({ key: 'teacher_name', value: document.getElementById("teacherName").value }, { onConflict: 'key' });
                await supabaseClient.from('app_settings').upsert({ key: 'director_name', value: document.getElementById("directorName").value }, { onConflict: 'key' });
                alert("Pengaturan sertifikat disimpan!");
                renderCertificateSettings();
            };
        }
        
        async function renderEarlyBirdSettings() {
            await loadAppSettings();
            let html = `
                <div class="card">
                    <h2>Pengaturan Early Bird Diskon</h2>
                    <form id="earlyBirdForm">
                        <div class="form-group">
                            <label>Aktifkan Early Bird</label>
                            <select id="earlyBirdEnabled">
                                <option value="true" ${settings.earlyBirdEnabled ? 'selected' : ''}>Ya (Aktif)</option>
                                <option value="false" ${!settings.earlyBirdEnabled ? 'selected' : ''}>Tidak (Nonaktif)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Persentase Diskon (%)</label>
                            <input type="number" id="earlyBirdDiscount" min="0" max="100" step="1" value="${settings.earlyBirdDiscount}">
                        </div>
                        <div class="form-group">
                            <label>Tanggal Berakhir Early Bird</label>
                            <input type="datetime-local" id="earlyBirdEndDate" value="${settings.earlyBirdEndDate.slice(0, 16)}">
                        </div>
                        <div class="form-group">
                            <label>Preview Harga Setelah Diskon</label>
                            <div style="background: #f0f0f0; padding: 15px; border-radius: 12px;">
                                <p><strong>1 Kursus:</strong> <span style="text-decoration:line-through;">Rp 200.000</span> → <strong>${formatRupiah(getDiscountedPrice(200000))}</strong></p>
                                <p><strong>Bundle:</strong> <span style="text-decoration:line-through;">Rp 800.000</span> → <strong>${formatRupiah(getDiscountedPrice(800000))}</strong></p>
                            </div>
                        </div>
                        <button type="submit" class="btn-success">Simpan Pengaturan</button>
                        <button type="button" id="backBtn" class="btn-back">Kembali</button>
                    </form>
                </div>
                <div class="card">
                    <h3>Countdown Status</h3>
                    <div id="earlyBirdStatus" style="padding: 10px; border-radius: 12px;"></div>
                </div>
            `;
            document.getElementById("adminContent").innerHTML = html;
            
            function updateStatus() {
                let div = document.getElementById("earlyBirdStatus");
                if (!div) return;
                let enabled = document.getElementById("earlyBirdEnabled")?.value === "true";
                let end = new Date(document.getElementById("earlyBirdEndDate")?.value);
                let now = new Date();
                let disc = document.getElementById("earlyBirdDiscount")?.value || 0;
                if (!enabled) div.innerHTML = `<div class="alert-warning">Early Bird NONAKTIF. Harga normal.</div>`;
                else if (now > end) div.innerHTML = `<div class="alert-danger">Early Bird telah BERAKHIR pada ${end.toLocaleString()}.</div>`;
                else {
                    let diff = end - now;
                    let d = Math.floor(diff / 86400000);
                    let h = Math.floor((diff % 86400000) / 3600000);
                    let m = Math.floor((diff % 3600000) / 60000);
                    let s = Math.floor((diff % 60000) / 1000);
                    div.innerHTML = `<div class="alert-success">Early Bird AKTIF! Diskon ${disc}% berlaku: ${d} hari ${h} jam ${m} menit ${s} detik lagi!</div>`;
                }
            }
            let interval = setInterval(updateStatus, 1000);
            updateStatus();
            document.getElementById("backBtn").onclick = () => { clearInterval(interval); renderAdminDashboard(); };
            document.getElementById("earlyBirdForm").onsubmit = async (e) => {
                e.preventDefault();
                let enabled = document.getElementById("earlyBirdEnabled").value === "true";
                let discount = parseInt(document.getElementById("earlyBirdDiscount").value);
                let endDate = document.getElementById("earlyBirdEndDate").value;
                await supabaseClient.from('app_settings').upsert({ key: 'early_bird_enabled', value: String(enabled) }, { onConflict: 'key' });
                await supabaseClient.from('app_settings').upsert({ key: 'early_bird_discount', value: String(discount) }, { onConflict: 'key' });
                await supabaseClient.from('app_settings').upsert({ key: 'early_bird_end_date', value: endDate }, { onConflict: 'key' });
                settings.earlyBirdEnabled = enabled;
                settings.earlyBirdDiscount = discount;
                settings.earlyBirdEndDate = endDate;
                alert("Pengaturan Early Bird disimpan!");
                clearInterval(interval);
                renderEarlyBirdSettings();
            };
        }
        
        async function loadPromoData() {
            const { data } = await supabaseClient.from('promo_codes').select('*');
            promoData = data || [];
        }
        
        async function savePromoCode(promo) {
            await supabaseClient.from('promo_codes').upsert(promo);
            await loadPromoData();
        }
        
        async function deletePromoCode(id) {
            await supabaseClient.from('promo_codes').delete().eq('id', id);
            await loadPromoData();
        }
        
        async function loadPracticalScores() {
            const { data } = await supabaseClient.from('practical_scores').select('*, profiles(full_name)');
            practicalScores = data || [];
        }
        
        async function savePracticalScore(userId, courseId, lessonId, score, notes) {
            await supabaseClient.from('practical_scores').insert({ user_id: userId, course_id: courseId, lesson_id: lessonId, score, notes, evaluated_by: currentUser.id });
            await loadPracticalScores();
        }
        
        async function route() {
            let hash = window.location.hash.slice(1);
            if (!supabaseClient) { 
                showLoading("Menghubungkan ke server...");
                let success = await initSupabase(); 
                if (!success) return; 
            }
            if (hash === "" || hash === "landing") renderLandingPage();
            else if (hash === "register") renderRegisterForm(false);
            else if (hash === "register-bundle") renderRegisterForm(true);
            else if (hash === "login") renderLoginForm();
            else if (hash === "forgot-password") renderForgotPassword();
            else if (hash === "dashboard") { if (currentUser) renderUserDashboard(); else window.location.hash = "#login"; }
            else if (hash === "admin") renderAdminLogin();
            else if (hash === "admin-dashboard") { if (isAdmin) renderAdminDashboard(); else { alert("Akses ditolak. Anda bukan admin."); window.location.hash = "#landing"; } }
            else renderLandingPage();
        }
        
        window.addEventListener("hashchange", route);
        let saved = localStorage.getItem("darkMode");
        if (saved === "true") document.documentElement.setAttribute("data-theme", "dark");
        route();
    </script>
</body>
</html>
