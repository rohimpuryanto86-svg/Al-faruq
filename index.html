<html lang="id" data-theme="light">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        :root {
            --primary: #1e6b3b;
            --primary-dark: #0b3b2f;
            --secondary: #f4a261;
            --secondary-dark: #e76f51;
            --bg-body: linear-gradient(135deg, #0b3b2f, #1e6b3b);
            --bg-card: white;
            --text-color: #333;
            --text-light: white;
            --border-color: #ddd;
            --bg-lesson: #f8f9fa;
            --bg-lesson-hover: #e9ecef;
            --bg-completed: #d4edda;
        }

        [data-theme="dark"] {
            --primary: #2d8f4e;
            --primary-dark: #1a5a3a;
            --secondary: #f4a261;
            --secondary-dark: #e76f51;
            --bg-body: linear-gradient(135deg, #1a1a2e, #16213e);
            --bg-card: #2d2d3f;
            --text-color: #e0e0e0;
            --bg-lesson: #3a3a55;
            --bg-lesson-hover: #4a4a6a;

        body { background: var(--bg-body); min-height: 100vh; transition: background 0.3s; }
        .container { max-width: 1200px; margin: auto; padding: 20px; }

        /* Sertifikat & Rapor - Ukuran A4, margin rapi, font normal */
        @media print {
            body { background: white; padding: 0; margin: 0; }
            .container { max-width: 100%; padding: 0; margin: 0; }
            .no-print { display: none; }
            .certificate-container, .report-container {
                margin: 0;
                padding: 20px;
                box-shadow: none;
                border: none;
            }
            @page {
                size: A4;
                margin: 1.5cm;
            }
        }
        
        .certificate-container {
            background: white;
            max-width: 210mm;
            min-height: 297mm;
            margin: 0 auto;
            padding: 20mm;
            box-sizing: border-box;
            border: 1px solid #ddd;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            font-family: 'Times New Roman', Times, serif;
        }
        
        .certificate-border {
            border: 2px solid #f4a261;
            padding: 15mm;
            height: 100%;
            position: relative;
        }
        
        .certificate-logo { font-size: 2.5rem; text-align: center; margin-bottom: 10px; }
        .certificate-title { text-align: center; font-size: 28pt; color: #1e6b3b; letter-spacing: 4px; margin: 15px 0; font-weight: bold; }
        .certificate-subtitle { text-align: center; font-size: 16pt; color: #666; margin-bottom: 20px; }
        .certificate-divider { width: 80px; height: 3px; background: #f4a261; margin: 15px auto; }
        .certificate-recipient { text-align: center; margin: 25px 0; }
        .certificate-recipient-label { font-size: 12pt; color: #666; }
        .certificate-recipient-name { font-size: 28pt; font-weight: bold; color: #2c3e50; margin: 10px 0; font-family: 'Times New Roman', serif; }
        .certificate-course { text-align: center; font-size: 18pt; color: #e67e22; margin: 20px 0; font-weight: bold; }
        .certificate-description { text-align: center; font-size: 11pt; color: #555; margin: 20px 0; line-height: 1.6; }
        .certificate-score { text-align: center; font-size: 14pt; margin: 10px 0; }
        .certificate-footer { margin-top: 30px; display: flex; justify-content: space-between; }
        .certificate-signature { text-align: center; width: 45%; }
        .certificate-signature-line { border-top: 1px solid #333; width: 80%; margin: 30px auto 10px; }
        .certificate-qr { text-align: center; margin-top: 20px; }
        .certificate-id { text-align: center; font-size: 9pt; color: #999; margin-top: 15px; }
        
        .report-container {
            background: white;
            max-width: 210mm;
            min-height: 297mm;
            margin: 0 auto;
            padding: 20mm;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        
        .report-header { text-align: center; margin-bottom: 20px; }
        .report-title { font-size: 20pt; color: #1e6b3b; font-weight: bold; }
        .report-subtitle { font-size: 10pt; color: #666; }
        .report-section { margin: 15px 0; }
        .report-section-title { font-size: 14pt; font-weight: bold; border-bottom: 2px solid #1e6b3b; padding-bottom: 5px; margin-bottom: 10px; }
        .report-table { width: 100%; border-collapse: collapse; margin: 10px 0; }
        .report-table th, .report-table td { border: 1px solid #ddd; padding: 8px; text-align: left; font-size: 10pt; }
        .report-table th { background: #1e6b3b; color: white; }
        .badge-list { display: flex; gap: 15px; flex-wrap: wrap; margin: 10px 0; }
        .badge-item { text-align: center; padding: 10px; background: #f8f9fa; border-radius: 12px; min-width: 80px; }
        .badge-item.earned { background: #d4edda; border: 1px solid #27ae60; }

        /* Landing Page Styles */
        .landing-header { text-align: center; color: var(--text-light); padding: 40px 20px 20px 20px; }
        .logo { font-size: 2rem; font-weight: bold; letter-spacing: 2px; margin-bottom: 10px; }
        .tagline { font-size: 1rem; opacity: 0.9; }
        button, .btn { background: var(--secondary); border: none; padding: 12px 24px; border-radius: 40px; cursor: pointer; font-weight: bold; transition: 0.2s; margin: 5px; display: inline-block; color: #333; }
        button:hover, .btn:hover { background: var(--secondary-dark); transform: scale(1.02); }
        .btn-success { background: #27ae60; color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--text-light); color: var(--text-light); }
        .btn-outline:hover { background: var(--text-light); color: var(--primary-dark); }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-edit { background: #f39c12; color: white; }
        .btn-back { background: #7f8c8d; color: white; }
        .btn-copy { background: #3498db; color: white; }
        .btn-primary { background: #3498db; color: white; }
        .btn-telegram { background: #0088cc; color: white; }
        .card { background: var(--bg-card); border-radius: 28px; padding: 25px; margin-bottom: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); color: var(--text-color); transition: background 0.3s; }
        .benefit-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin: 30px 0; }
        .benefit-card { background: var(--bg-card); border-radius: 20px; padding: 20px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .course-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .course-card { background: var(--bg-card); border-radius: 24px; padding: 20px; text-align: center; position: relative; transition: 0.2s; border: 1px solid var(--border-color); }
        .course-card.owned { border: 2px solid #27ae60; background: rgba(39,174,96,0.05); }
        .course-icon { font-size: 2.5rem; margin-bottom: 10px; }
        .course-title { font-size: 1.2rem; font-weight: bold; margin: 10px 0; }
        .course-price { font-size: 1.2rem; font-weight: bold; color: var(--secondary-dark); margin: 10px 0; }
        .commission-table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        .commission-table th, .commission-table td { border: 1px solid var(--border-color); padding: 10px; text-align: center; }
        .commission-table th { background: var(--primary); color: white; }
        .price-card { background: #f8f9fa; border-radius: 20px; padding: 20px; text-align: center; }
        .price-old { text-decoration: line-through; color: #999; font-size: 0.9rem; }
        .price-new { font-size: 1.8rem; font-weight: bold; color: var(--secondary-dark); }
        .countdown-badge { background: rgba(0,0,0,0.8); display: inline-block; padding: 10px 20px; border-radius: 50px; font-size: 1.2rem; font-weight: bold; color: var(--secondary); margin: 20px 0; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab { background: rgba(255,255,255,0.2); padding: 8px 20px; border-radius: 40px; cursor: pointer; color: white; font-weight: bold; }
        .tab.active { background: var(--secondary); color: var(--primary-dark); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px; border-radius: 30px; border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-color); }
        .alert { padding: 12px; border-radius: 16px; margin-bottom: 15px; }
        .alert-success { background: #d4edda; color: #155724; border-left: 4px solid #27ae60; }
        .alert-warning { background: #fff3cd; color: #856404; border-left: 4px solid #ffc107; }
        .alert-info { background: #d1ecf1; color: #0c5460; border-left: 4px solid #17a2b8; }
        .alert-danger { background: #f8d7da; color: #721c24; border-left: 4px solid #e74c3c; }
        .progress-bar { background: #e0e0e0; border-radius: 20px; height: 10px; margin: 10px 0; overflow: hidden; }
        .progress-fill { background: #27ae60; height: 100%; width: 0%; border-radius: 20px; }
        .lesson-list { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; }
        .lesson-item { background: var(--bg-lesson); border-radius: 16px; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .lesson-item.completed { background: var(--bg-completed); border-left: 4px solid #27ae60; }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; margin: 20px 0; border-radius: 20px; overflow: hidden; }
        .video-wrapper iframe { position: absolute; width: 100%; height: 100%; }
        .admin-corner-btn { position: fixed; top: 20px; right: 20px; z-index: 1000; background: #2c3e50; color: white; padding: 10px 20px; border-radius: 40px; cursor: pointer; font-weight: bold; }
        .dark-mode-toggle { position: fixed; top: 20px; left: 20px; z-index: 1000; background: #2c3e50; color: white; padding: 10px 16px; border-radius: 40px; cursor: pointer; font-weight: bold; }
        
        @media (max-width: 768px) {
            .benefit-grid { grid-template-columns: 1fr; }
            .certificate-container { padding: 10mm; }
            .certificate-title { font-size: 20pt; }
            .certificate-recipient-name { font-size: 22pt; }
        }
    </style>
</head>
<body>
    <div class="container" id="appRoot">Memuat aplikasi...</div>

    <script>
        // ======================== KONFIGURASI SUPABASE ========================
        // GANTI DENGAN PROYEK SUPABASE ANDA
        const SUPABASE_URL = "https://yfrpaacvuvgtqbsuihoa.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlmcnBhYWN2dXZndHFic3VpaG9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3NzI2OTcsImV4cCI6MjA5MzM0ODY5N30.kKhxyE03vIflYRp3MKjOP1Sd_3V81uk05tv5BQ_Ck68";
        
        // ======================== KONFIGURASI QRIS MANUAL ========================
        const QRIS_IMAGE_URL = "https://i.ibb.co.com/4Rq0V6JN/Kode-QRIS-ROHIM-PURYANTO-S-PD-I-Edukasi-1.png"; // Ganti dengan gambar QRIS asli
        const BANK_ACCOUNT = "BRI: 4878 0102 2800 534 a.n Rohim Puryanto";
        
        // ======================== GLOBAL VARIABLES ========================
        let supabaseClient = null;
        let coursesData = [];
        let currentUser = null;
        let isAdmin = false;
        let currentCourseForUser = null;
        let selectedLessonIndex = null;
        let settings = {
            defaultWhatsappNumber: "6281359659947",
            earlyBirdEnabled: true,
            earlyBirdDiscount: 20,
            earlyBirdEndDate: new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString()
        };
        let badgesData = [];
        
        // ======================== HELPER FUNCTIONS ========================
        function formatRupiah(amount) {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(amount);
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function getDiscountedPrice(price) {
            if (settings.earlyBirdEnabled && new Date() < new Date(settings.earlyBirdEndDate)) {
                return Math.round(price * (1 - settings.earlyBirdDiscount / 100));
            }
            return price;
        }
        
        // ======================== SUPABASE INIT ========================
        async function initSupabase() {
            try {
                supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                await loadBadges();
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (session) {
                    currentUser = session.user;
                    await loadUserProfile();
                    await checkAdminStatus();
                }
                await loadCourses();
                await loadAppSettings();
                return true;
            } catch(e) { 
                console.error(e); 
                document.getElementById("appRoot").innerHTML = '<div class="card"><h2>Error Koneksi</h2><p>Gagal terhubung ke database. Pastikan koneksi internet aktif.</p></div>';
                return false; 
            }
        }
        
        async function loadAppSettings() {
            const { data } = await supabaseClient.from('app_settings').select('key, value');
            if (data) {
                data.forEach(s => {
                    if (s.key === 'early_bird_enabled') settings.earlyBirdEnabled = s.value === 'true';
                    if (s.key === 'early_bird_discount') settings.earlyBirdDiscount = parseInt(s.value);
                    if (s.key === 'early_bird_end_date') settings.earlyBirdEndDate = s.value;
                });
            }
        }
        
        async function loadBadges() {
            const { data } = await supabaseClient.from('badges').select('*');
            badgesData = data || [
                { id: 1, name: "Pemula", icon: "🌱", requirement: "Menyelesaikan 1 materi" },
                { id: 2, name: "Semangat", icon: "🔥", requirement: "Menyelesaikan 5 materi" },
                { id: 3, name: "Sarjana", icon: "🎓", requirement: "Menyelesaikan 1 kursus" },
                { id: 4, name: "Master", icon: "👑", requirement: "Menyelesaikan semua kursus" }
            ];
        }
        
        async function loadUserProfile() {
            if (!currentUser) return;
            const { data } = await supabaseClient.from('profiles').select('*').eq('user_id', currentUser.id).single();
            if (data) {
                currentUser.profile = data;
                currentUser.name = data.full_name;
                currentUser.walletBalance = data.wallet_balance || 0;
                currentUser.referralCode = data.referral_code;
                currentUser.canRefer = data.can_refer || false;
                currentUser.phone = data.phone;
                currentUser.status = data.status;
                currentUser.purchasedCourses = data.purchased_courses || [];
                currentUser.isBundle = data.is_bundle || false;
                currentUser.completedLessons = {};
                await loadUserProgress();
                await loadUserBadges();
                await loadScores();
            }
        }
        
        async function loadUserProgress() {
            const { data } = await supabaseClient.from('user_progress').select('*').eq('user_id', currentUser.id);
            if (data) {
                data.forEach(p => { currentUser.completedLessons[p.course_id] = p.completed_lessons || []; });
            }
        }
        
        async function loadUserBadges() {
            const { data } = await supabaseClient.from('user_badges').select('badge_id').eq('user_id', currentUser.id);
            currentUser.earnedBadges = (data || []).map(b => b.badge_id);
        }
        
        async function loadScores() {
            const { data } = await supabaseClient.from('scores').select('*').eq('user_id', currentUser.id);
            currentUser.scores = data || [];
        }
        
        async function checkAdminStatus() {
            const { data } = await supabaseClient.from('user_roles').select('is_admin').eq('user_id', currentUser.id).single();
            isAdmin = data?.is_admin === true;
            return isAdmin;
        }
        
        async function loadCourses() {
            const { data } = await supabaseClient.from('courses').select('*').order('id');
            if (data && data.length > 0) {
                coursesData = data.map(c => ({ ...c, lessons: c.lessons || [], price: c.price || 200000, telegram_group: c.telegram_group || '' }));
            } else {
                coursesData = [
                    { id: 1, title: "Baca Al-Qur'an", icon: "📖", description: "Metode tahsin sederhana, praktik dari juz 30", price: 200000, telegram_group: "", lessons: [] },
                    { id: 2, title: "Baca Kitab Gundul", icon: "📚", description: "Kenali huruf hijaiyah, pola nahwu-sharaf dasar", price: 200000, telegram_group: "", lessons: [] },
                    { id: 3, title: "Bahasa Arab Umroh", icon: "🕋", description: "300+ kosakata, simulasi dialog", price: 200000, telegram_group: "", lessons: [] },
                    { id: 4, title: "Shalat Khusyu'", icon: "🕌", description: "Makna bacaan shalat, tips khusyu' terbukti", price: 200000, telegram_group: "", lessons: [] }
                ];
                for (const c of coursesData) {
                    await supabaseClient.from('courses').upsert(c);
                }
            }
            return coursesData;
        }
        
        async function saveCourse(course) {
            await supabaseClient.from('courses').upsert({
                id: course.id, title: course.title, description: course.desc, icon: course.icon,
                price: course.price, lessons: course.lessons, telegram_group: course.telegramGroup
            });
            await loadCourses();
        }
        
        function isCourseOwned(courseId) {
            if (isAdmin) return true;
            if (currentUser?.isBundle) return true;
            if (currentUser?.purchasedCourses?.includes(courseId)) return true;
            return false;
        }
        
        async function purchaseCourse(courseId, price) {
            if (currentUser.walletBalance < price) {
                alert(`Saldo tidak cukup! Saldo: ${formatRupiah(currentUser.walletBalance)}`);
                return false;
            }
            const course = coursesData.find(c => c.id === courseId);
            if (!confirm(`Beli ${course?.title} seharga ${formatRupiah(price)}?`)) return false;
            
            const newBalance = currentUser.walletBalance - price;
            const newPurchased = [...(currentUser.purchasedCourses || []), courseId];
            
            await supabaseClient.from('profiles').update({ 
                wallet_balance: newBalance,
                purchased_courses: newPurchased
            }).eq('user_id', currentUser.id);
            
            currentUser.walletBalance = newBalance;
            currentUser.purchasedCourses = newPurchased;
            
            alert(`Berhasil membeli ${course?.title}! Saldo: ${formatRupiah(newBalance)}`);
            return true;
        }
        
        async function purchaseBundle() {
            let bundlePrice = getDiscountedPrice(800000);
            if (currentUser.walletBalance < bundlePrice) {
                alert(`Saldo tidak cukup! Saldo: ${formatRupiah(currentUser.walletBalance)}`);
                return false;
            }
            if (!confirm(`Beli BUNDLE (akses semua kursus) seharga ${formatRupiah(bundlePrice)}?`)) return false;
            
            const newBalance = currentUser.walletBalance - bundlePrice;
            await supabaseClient.from('profiles').update({ 
                wallet_balance: newBalance,
                is_bundle: true
            }).eq('user_id', currentUser.id);
            
            currentUser.walletBalance = newBalance;
            currentUser.isBundle = true;
            
            alert(`Berhasil membeli BUNDLE! Anda sekarang punya akses ke semua kursus. Saldo: ${formatRupiah(newBalance)}`);
            return true;
        }
        
        async function requestTopUp(amount, proofUrl) {
            const { data, error } = await supabaseClient.from('top_up_requests').insert({
                user_id: currentUser.id,
                amount: amount,
                proof_url: proofUrl,
                status: 'pending'
            });
            if (error) throw error;
            alert(`Request top up ${formatRupiah(amount)} diajukan. Menunggu verifikasi admin.`);
            return true;
        }
        
        async function topUpWallet(amount) {
            if (amount < 10000) {
                alert("Minimal top up Rp 10.000");
                return false;
            }
            const newBalance = currentUser.walletBalance + amount;
            await supabaseClient.from('profiles').update({ 
                wallet_balance: newBalance
            }).eq('user_id', currentUser.id);
            currentUser.walletBalance = newBalance;
            alert(`Top up ${formatRupiah(amount)} berhasil! Saldo: ${formatRupiah(newBalance)}`);
            return true;
        }
        
        async function checkAndUpdateReferralStatus() {
            let canRefer = false;
            for (const course of coursesData) {
                if (isCourseOwned(course.id)) {
                    let completed = currentUser.completedLessons[course.id] || [];
                    let totalLessons = (course.lessons || []).length;
                    if (completed.length === totalLessons && totalLessons > 0) {
                        let totalScore = 0;
                        let quizCount = 0;
                        for (let i = 0; i < totalLessons; i++) {
                            let quizScore = localStorage.getItem(`quiz_${currentUser.id}_${course.id}_${i}`);
                            if (quizScore) {
                                totalScore += parseInt(quizScore);
                                quizCount++;
                            }
                        }
                        let avgScore = quizCount > 0 ? (totalScore / quizCount) * 10 : 0;
                        if (avgScore >= 70) {
                            canRefer = true;
                            break;
                        }
                    }
                }
            }
            if (currentUser.canRefer !== canRefer) {
                await supabaseClient.from('profiles').update({ can_refer: canRefer }).eq('user_id', currentUser.id);
                currentUser.canRefer = canRefer;
            }
            return canRefer;
        }
        
        async function applyReferralCode(code) {
            if (!code) return false;
            const { data: referrer } = await supabaseClient.from('profiles')
                .select('user_id, full_name, can_refer')
                .eq('referral_code', code.toUpperCase())
                .single();
            if (!referrer || !referrer.can_refer) return false;
            await supabaseClient.from('profiles').update({ referred_by: referrer.user_id }).eq('user_id', currentUser.id);
            return true;
        }
        
        function getCourseProgress(courseId) {
            let completed = currentUser.completedLessons[courseId] || [];
            let total = coursesData.find(c => c.id === courseId)?.lessons?.length || 1;
            return { completed: completed.length, total, percent: (completed.length / total) * 100 };
        }
        
        function getOverallProgress() {
            let totalCompleted = 0, totalLessons = 0;
            coursesData.forEach(course => {
                if (isCourseOwned(course.id)) {
                    let completed = currentUser.completedLessons[course.id] || [];
                    totalCompleted += completed.length;
                    totalLessons += (course.lessons || []).length;
                }
            });
            return { completed: totalCompleted, total: totalLessons, percent: totalLessons > 0 ? (totalCompleted / totalLessons) * 100 : 0 };

        async function renderLessonsManager() {
            let course = coursesData.find(c => c.id == editingCourseId);
            let html = `<div class="card"><h2>Materi: ${course.title}</h2><div class="lesson-list">${(course.lessons || []).map((l, idx) => `<div class="lesson-item" data-idx="${idx}"><span><strong>${idx+1}. ${l.title}</strong></span><div><button class="edit-lesson" data-idx="${idx}" style="background:#3498db;">Edit</button><button class="delete-lesson" data-idx="${idx}" style="background:#e74c3c;">Hapus</button></div></div>`).join('')}</div><button id="addLesson" class="btn-success">+ Tambah Materi</button><button id="backBtn" class="btn-back">Kembali</button></div>`;
            document.getElementById("appRoot").innerHTML = html;
            document.getElementById("backBtn").onclick = () => renderCourseUIEditor();
            document.getElementById("addLesson").onclick = () => renderAddLessonForm();
            document.querySelectorAll(".edit-lesson").forEach(btn => { btn.onclick = () => { editingLessonIndex = parseInt(btn.getAttribute("data-idx")); renderEditLessonForm(); }; });
            document.querySelectorAll(".delete-lesson").forEach(btn => { btn.onclick = async () => { let idx = parseInt(btn.getAttribute("data-idx")); if (confirm(`Hapus materi "${course.lessons[idx].title}"?`)) { course.lessons.splice(idx, 1); await saveCourse(course); renderLessonsManager(); } }; });
        }
        
        async function renderAddLessonForm() {
            let course = coursesData.find(c => c.id == editingCourseId);
            let newNum = (course.lessons || []).length + 1;
            let html = `<div class="card"><h2>Tambah Materi Baru</h2><form id="addLessonForm"><div class="form-group"><label>Judul Materi</label><input type="text" id="title" placeholder="Pertemuan ${newNum}: ..." required></div><div class="form-group"><label>URL Video</label><input type="text" id="videoUrl" placeholder="https://www.youtube.com/embed/..."></div><div class="form-group"><label>Quiz (JSON)</label><textarea id="quiz" rows="5" placeholder='[{"q":"Soal 1","opt":["A","B","C","D"],"jawab":0}]'></textarea></div><button type="submit" class="btn-success">Tambah</button><button type="button" id="backBtn" class="btn-back">Kembali</button></form></div>`;
            document.getElementById("appRoot").innerHTML = html;
            document.getElementById("backBtn").onclick = () => renderLessonsManager();
            document.getElementById("addLessonForm").onsubmit = async (e) => {
                e.preventDefault();
                let quiz = [];
                try { quiz = JSON.parse(document.getElementById("quiz").value || "[]"); } catch(e) { quiz = []; }
                let newLesson = { number: newNum, title: document.getElementById("title").value, videoUrl: document.getElementById("videoUrl").value, quiz: quiz };
                course.lessons.push(newLesson);
                await saveCourse(course);
                alert(`Materi "${newLesson.title}" ditambahkan!`);
                renderLessonsManager();
            };
        }
        
        async function renderEditLessonForm() {
            let course = coursesData.find(c => c.id == editingCourseId);
            let lesson = course.lessons[editingLessonIndex];
            let html = `<div class="card"><h2>Edit Materi: ${lesson.title}</h2><form id="editLessonForm"><div class="form-group"><label>Judul</label><input type="text" id="title" value="${lesson.title}" required></div><div class="form-group"><label>URL Video</label><input type="text" id="videoUrl" value="${lesson.videoUrl || ''}"></div><div class="form-group"><label>Quiz (JSON)</label><textarea id="quiz" rows="5">${JSON.stringify(lesson.quiz || [], null, 2)}</textarea></div><button type="submit" class="btn-success">Simpan</button><button type="button" id="backBtn" class="btn-back">Kembali</button></form></div>`;
            document.getElementById("appRoot").innerHTML = html;
            document.getElementById("backBtn").onclick = () => renderLessonsManager();
            document.getElementById("editLessonForm").onsubmit = async (e) => {
                e.preventDefault();
                let quiz = [];
                try { quiz = JSON.parse(document.getElementById("quiz").value || "[]"); } catch(e) { quiz = []; }
                lesson.title = document.getElementById("title").value;
                lesson.videoUrl = document.getElementById("videoUrl").value;
                lesson.quiz = quiz;
                await saveCourse(course);
                alert("Materi disimpan!");
                renderEditLessonForm();
            };
        }
        
        async function route() {
            let hash = window.location.hash.slice(1);
            if (!supabaseClient) { let success = await initSupabase(); if (!success) return; }
            if (hash === "" || hash === "landing") renderLandingPage();
            else if (hash === "register") renderRegisterForm();
            else if (hash === "login") renderLoginForm();
            else if (hash === "forgot-password") renderForgotPassword();
            else if (hash === "dashboard") { if (currentUser) renderUserDashboard(); else window.location.hash = "#login"; }
            else if (hash === "admin") renderAdminLogin();
            else if (hash === "admin-dashboard") { if (isAdmin) renderAdminDashboard(); else { alert("Akses ditolak"); window.location.hash = "#landing"; } }
            else renderLandingPage();
        }
        
        window.addEventListener("hashchange", route);
        let saved = localStorage.getItem("darkMode");
        if (saved === "true") document.documentElement.setAttribute("data-theme", "dark");
        route();
    </script>
</body>
</html>
