async function callPPOBEdgeFunction(action, data = {}) {
    try {
        const { data: result, error } = await supabaseClient.functions.invoke("ppob", { body: { action, ...data } });
        if (error) throw new Error(error.message);
        return result;

}

async function uploadToImgBBViaEdge(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = async () => {
            const base64 = reader.result.split(",")[1];
            try {
                const result = await callPPOBEdgeFunction("upload", { image: base64 });
                resolve(result.url);
            } catch (err) { reject(err); }
        };
        reader.onerror = () => reject(new Error("Gagal membaca file"));
        reader.readAsDataURL(file);
    });
}

async function processPPOBPurchase(sku, customerId, price, productName) {
    if (currentUser.walletBalance < price) throw new Error(`Saldo tidak cukup! Saldo: ${formatRupiah(currentUser.walletBalance)}`);
    const refId = `PPOB_${Date.now()}_${currentUser.id.slice(0, 8)}`;
    const result = await callPPOBEdgeFunction("buy", { sku: sku, customerId: customerId, amount: price, refId: refId });
    if (result.success) {
        const newBalance = currentUser.walletBalance - price;
        await supabaseClient.from('profiles').update({ wallet_balance: newBalance }).eq('user_id', currentUser.id);
        currentUser.walletBalance = newBalance;
        await supabaseClient.from('ppob_transactions').insert({
            user_id: currentUser.id, product_sku: sku, product_name: productName, customer_id: customerId,
            amount: price, price_paid: price, status: "success", ref_id: refId
        });
        return result;
    } else throw new Error(result.error || "Transaksi gagal");
}

async function checkAndUpdateReferralStatus() {
    let canRefer = false;
    const { data: allScores } = await supabaseClient
        .from('scores').select('*').eq('user_id', currentUser.id);
    currentUser.scores = allScores || [];
    for (const course of coursesData) {
        if (isCourseOwned(course.id)) {
            let completed = currentUser.completedLessons[course.id] || [];
            let totalLessons = (course.lessons || []).length;
            if (completed.length === totalLessons && totalLessons > 0) {
                let courseScores = currentUser.scores.filter(s => s.course_id === course.id);
                let avgScore = courseScores.length > 0
                    ? courseScores.reduce((sum, s) => sum + (s.quiz_score || 0), 0) / courseScores.length
                    : 0;
                if (avgScore >= 70) { canRefer = true; break; }
            }
        }
    }
    if (currentUser.canRefer !== canRefer) {
        await supabaseClient.from('profiles').update({ can_refer: canRefer }).eq('user_id', currentUser.id);
        currentUser.canRefer = canRefer;
    }
    return canRefer;
}

async function checkAndAwardBadges() {
    // Always recalculate from scratch — never trust cached DB badges
    // This ensures wrongly awarded badges (e.g. Master from old bug) get corrected
    let previousEarned = currentUser.earnedBadges ? [...currentUser.earnedBadges] : [];
    let correctEarned = [];

    let totalCompleted = 0;
    let ownedCourses = coursesData.filter(c => isCourseOwned(c.id));
    let completedCourses = 0;

    for (const course of ownedCourses) {
        let completed = currentUser.completedLessons[course.id] || [];
        let totalLessons = (course.lessons || []).length;
        totalCompleted += completed.length;
        if (totalLessons > 0 && completed.length === totalLessons) completedCourses++;
    }

    // Master requires ALL owned courses completed AND must own more than 1
    let allCoursesCompleted = completedCourses === ownedCourses.length && ownedCourses.length > 1;

    for (const badge of badgesData) {
        let shouldEarn = false;
        let req = (badge.requirement || '').toLowerCase();
        let name = (badge.name || '').toLowerCase();
        if (badge.id === 1 || name === 'pemula' || req.includes('1 materi')) {
            shouldEarn = totalCompleted >= 1;
        } else if (badge.id === 2 || name === 'semangat' || req.includes('5 materi')) {
            shouldEarn = totalCompleted >= 5;
        } else if (badge.id === 3 || name === 'sarjana' || req.includes('1 kursus')) {
            shouldEarn = completedCourses >= 1;
        } else if (badge.id === 4 || name === 'master' || req.includes('semua kursus')) {
            shouldEarn = allCoursesCompleted;
        }
        if (shouldEarn) correctEarned.push(badge.id);
    }

    // Find newly earned badges (not in previous list)
    let newBadges = badgesData.filter(b => correctEarned.includes(b.id) && !previousEarned.includes(b.id));

    // Always save the corrected list back to DB (fixes wrongly awarded badges)
    if (JSON.stringify(correctEarned.sort()) !== JSON.stringify(previousEarned.sort())) {
        currentUser.earnedBadges = correctEarned;
        await supabaseClient.from('profiles').update({ earned_badges: correctEarned }).eq('user_id', currentUser.id);
    }

    if (newBadges.length > 0) {
        let badgeNames = newBadges.map(b => `${b.icon || '🏅'} ${b.name}`).join(', ');
        alert(`🎉 Selamat! Kamu mendapat badge baru: ${badgeNames}`);
    }
    return newBadges;
}

function getCourseProgress(courseId) {
    let completed = currentUser.completedLessons[courseId] || [];
    let total = coursesData.find(c => c.id === courseId)?.lessons?.length || 1;
    return { completed: completed.length, total, percent: (completed.length / total) * 100 };
}

function getOverallProgress() {
    let totalCompleted = 0, totalLessons = 0;
    coursesData.forEach(course => {
        if (isCourseOwned(course.id)) {
            let completed = currentUser.completedLessons[course.id] || [];
            totalCompleted += completed.length;
            totalLessons += (course.lessons || []).length;
        }
    });
    return { completed: totalCompleted, total: totalLessons, percent: totalLessons > 0 ? (totalCompleted / totalLessons) * 100 : 0 };
}

        if (diff > 0) {
            let d = Math.floor(diff / 86400000);
            let h = Math.floor((diff % 86400000) / 3600000);
            let m = Math.floor((diff % 3600000) / 60000);
            let s = Math.floor((diff % 60000) / 1000);

function getEmbedUrl(url) {
    if (!url) return null;
    url = url.trim();
    let ytMatch = url.match(/(?:youtube\.com\/(?:watch\?v=|shorts\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
    if (ytMatch) return `https://www.youtube.com/embed/${ytMatch[1]}?rel=0`;
    let driveMatch = url.match(/drive\.google\.com\/file\/d\/([^/]+)/);
    if (driveMatch) return `https://drive.google.com/file/d/${driveMatch[1]}/preview`;
    if (url.startsWith('http')) return url;
    return null;
}

function renderLessonDetail() {
    let lesson = currentCourseForUser.lessons[selectedLessonIndex];
    let completed = currentUser.completedLessons[currentCourseForUser.id] || [];
    let isCompleted = completed.includes(selectedLessonIndex);
    let hasQuiz = lesson.quiz && Array.isArray(lesson.quiz) && lesson.quiz.length > 0;
    let embedUrl = getEmbedUrl(lesson.videoUrl);
    let contentHtml = '';
    if (lesson.content) {
        let isPlainText = !/<[a-z][\s\S]*>/i.test(lesson.content);
        if (isPlainText) contentHtml = `<div class="lesson-content" style="line-height:1.8; margin:15px 0; white-space:pre-wrap;">${escapeHtml(lesson.content)}</div>`;
        else contentHtml = `<div class="lesson-content" style="line-height:1.8; margin:15px 0;">${lesson.content}</div>`;
    }
    let html = `<div class="tabs"><div class="tab" id="backToCourse">Kembali</div><div class="tab active">${escapeHtml(lesson.title)}</div>${hasQuiz ? `<div class="tab" id="quizTab">📝 Quiz</div>` : ''}</div>
        <div class="card"><h3>${escapeHtml(lesson.title)}</h3>${embedUrl ? `<div class="video-wrapper"><iframe src="${embedUrl}" frameborder="0" allowfullscreen></iframe></div>` : ''}${contentHtml}${!embedUrl && !lesson.content ? '<div class="alert-info">📖 Materi akan segera ditambahkan oleh instruktur.</div>' : ''}

    document.getElementById("appRoot").innerHTML = html;
    document.getElementById("backToCourse").onclick = () => renderLearningView();
    document.getElementById("backBtn").onclick = () => renderLearningView();
    if (hasQuiz) {
        if (document.getElementById("quizTab")) document.getElementById("quizTab").onclick = () => renderQuizPage();
        if (document.getElementById("quizBtnBottom")) document.getElementById("quizBtnBottom").onclick = () => renderQuizPage();
    }
    if (document.getElementById("markComplete")) {
        document.getElementById("markComplete").onclick = async () => {
            let completed = currentUser.completedLessons[currentCourseForUser.id] || [];
            if (!completed.includes(selectedLessonIndex)) {
                completed.push(selectedLessonIndex);
                currentUser.completedLessons[currentCourseForUser.id] = completed;
                const { error } = await supabaseClient.from('user_progress').upsert({ user_id: currentUser.id, course_id: currentCourseForUser.id, completed_lessons: completed, last_accessed: new Date().toISOString() }, { onConflict: 'user_id, course_id' });

                await checkAndAwardBadges();

            }
        };

function renderQuizPage() {
    let lesson = currentCourseForUser.lessons[selectedLessonIndex];
    let quiz = lesson.quiz;
    if (!quiz || !Array.isArray(quiz) || quiz.length === 0) { alert("Belum ada quiz untuk materi ini."); renderLessonDetail(); return; }
    let validQuiz = quiz.filter(q => q.q && Array.isArray(q.opt) && q.opt.length >= 2 && typeof q.jawab === 'number');
    if (validQuiz.length === 0) { alert("Format quiz tidak valid. Hubungi admin."); renderLessonDetail(); return; }
    let existing = localStorage.getItem(`quiz_${currentUser.id}_${currentCourseForUser.id}_${selectedLessonIndex}`);
    if (existing) { alert(`Anda sudah mengerjakan quiz ini dengan nilai: ${parseInt(existing) * 10}/100`); renderLessonDetail(); return; }
    let html = `<div class="tabs"><div class="tab" id="backToLesson">Kembali ke Materi</div><div class="tab active">📝 Quiz: ${escapeHtml(lesson.title)}</div></div>
        <div class="card"><div class="alert-info">📋 Jawab semua soal berikut. Nilai minimal kelulusan: <strong>70/100</strong></div>
        <form id="quizForm">${validQuiz.map((q, idx) => `<div class="form-group" style="background:var(--bg-lesson); border-radius:16px; padding:15px; margin-bottom:12px;"><label style="font-weight:bold;">${idx+1}. ${escapeHtml(q.q)}</label>
        <div style="display:flex; flex-direction:column; gap:8px;">${q.opt.map((o, oi) => `<label style="display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:10px; border:1px solid var(--border-color);"><input type="radio" name="q${idx}" value="${oi}" required> <span>${escapeHtml(o)}</span></label>`).join('')}</div></div>`).join('')}
        <button type="submit" class="btn-success">Kirim Jawaban</button></form><div id="quizResult"></div></div>`;
    document.getElementById("appRoot").innerHTML = html;
    document.getElementById("backToLesson").onclick = () => renderLessonDetail();
    document.getElementById("quizForm").onsubmit = async (e) => {
        e.preventDefault();
        let score = 0;
        validQuiz.forEach((q, idx) => { let sel = document.querySelector(`input[name="q${idx}"]:checked`); if (sel && parseInt(sel.value) === q.jawab) score++; });
        const { error } = await supabaseClient.from('scores').upsert({ user_id: currentUser.id, course_id: currentCourseForUser.id, lesson_id: selectedLessonIndex, quiz_score: score * 10, taken_at: new Date().toISOString() }, { onConflict: 'user_id, course_id, lesson_id' });
        if (error) { console.error("Error saving score:", error); alert("Gagal menyimpan nilai!\n\nDetail: " + (error.message || error.details || JSON.stringify(error))); return; }
        if (score >= 7) {
            let completed = currentUser.completedLessons[currentCourseForUser.id] || [];
            if (!completed.includes(selectedLessonIndex)) { completed.push(selectedLessonIndex); currentUser.completedLessons[currentCourseForUser.id] = completed;
            await supabaseClient.from('user_progress').upsert({ user_id: currentUser.id, course_id: currentCourseForUser.id, completed_lessons: completed }, { onConflict: 'user_id, course_id' }); }
            await checkAndUpdateReferralStatus();
            await checkAndUpdateReferralStatus();
            await checkAndUpdateReferralStatus();
            await checkAndAwardBadges();
            document.getElementById("quizResult").innerHTML = `<div class="alert-success">✅ Lulus! Nilai: ${score * 10}/100</div>`;
            setTimeout(() => { renderLearningView(); }, 2000);
        } else { document.getElementById("quizResult").innerHTML = `<div class="alert-danger">❌ Belum lulus. Nilai: ${score * 10}/100. Minimal 70.</div>`; }
    };
}

async function loadPPOBProducts(category) {
    const container = document.getElementById("ppobProductsContainer");
    if (!container) return;
    
    // Cek limit harian untuk e-wallet
    let todayEwalletTotal = 0;
    let ewalletLimit = 500000; // Rp 500.000 per hari
    
    if (category === "ewallet") {
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        
        const { data: todayTransactions } = await supabaseClient
            .from('ppob_transactions')
            .select('amount')
            .eq('user_id', currentUser.id)
            .eq('product_sku', 'ewallet')
            .gte('created_at', today.toISOString());
        
        if (todayTransactions && todayTransactions.length > 0) {
            todayEwalletTotal = todayTransactions.reduce((sum, t) => sum + t.amount, 0);
        }
    }
    
    const products = PPOB_PRODUCTS[category] || [];
    if (products.length === 0) {
        container.innerHTML = '<div class="alert-warning">Belum ada produk untuk kategori ini</div>';
        return;
    }
    
    let productsHtml = `<div class="course-grid">`;
    
    for (const product of products) {
        const price = getPPOBPrice(product.basePrice, product.markup);
        let isDisabled = false;
        let disabledReason = "";
        
        if (category === "ewallet") {
            const remainingLimit = ewalletLimit - todayEwalletTotal;
            if (remainingLimit < price) {
                isDisabled = true;
                disabledReason = `Sisa limit hari ini ${formatRupiah(remainingLimit)}`;
            }
        }
        
        productsHtml += `
            <div class="course-card ppob-product-card">
                <div class="course-icon">${getProductIconPPOB(category)}</div>
                <div class="course-title">${product.name}</div>
                <div class="course-price">${formatRupiah(price)}</div>
                ${category === "ewallet" ? `<div class="alert-info" style="font-size:0.7rem;">💰 Sisa limit harian: ${formatRupiah(ewalletLimit - todayEwalletTotal)}</div>` : ''}
                ${isDisabled ? `<div class="alert-warning" style="font-size:0.7rem;">⚠️ ${disabledReason}</div>` : ''}
                <button class="btn-primary select-ppob-product" 
                        data-sku="${product.sku}"
                        data-name="${product.name}"
                        data-price="${price}"
                        data-category="${category}"
                        ${isDisabled ? 'disabled' : ''}>
                    ${isDisabled ? 'Limit Habis' : 'Beli'}
                </button>
            </div>
        `;
    }
    
    productsHtml += `</div>`;
    container.innerHTML = productsHtml;
// ======================== EVENT LISTENER UNTUK TOMBOL BELI PPOB ========================

                `).join('')}
            </div>
        </div>
        <div class="card">
            <h2>Rapor Nilai</h2>
            <table class="report-table">
                <thead>
                    <tr style="background:#1e6b3b; color:white;">
                        <th>Kursus</th><th>Materi</th><th>Nilai Quiz</th>
                    </tr>
                </thead>
                <tbody>
                    ${currentUser.scores.map(s => {
                        let course = coursesData.find(c => c.id === s.course_id);
                        let lesson = course?.lessons[s.lesson_id];
                        return `<tr>
                            <td>${course?.title || '-'}</td>
                            <td>${lesson?.title || '-'}</td>
                            <td>${s.quiz_score || '-'}</td>
                        </tr>`;
                    }).join('') || '<tr><td colspan="3">Belum ada nilai</td></tr>'}
                </tbody>
            </table>
            <button id="downloadReportBtn" class="btn-success" style="margin-top:15px;">Download Rapor PDF</button>
        </div>
    `;
    
    document.getElementById("appRoot").innerHTML = html;
    document.getElementById("backToDash").onclick = () => renderUserDashboard();
    
    document.getElementById("downloadReportBtn").onclick = async () => {
        const btn = document.getElementById("downloadReportBtn");
        btn.disabled = true;
        btn.textContent = "Menyiapkan PDF...";
        try {
            const { data: freshScores } = await supabaseClient
                .from('scores').select('*').eq('user_id', currentUser.id);
            currentUser.scores = freshScores || [];

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });
            const green = [30, 107, 59];
            const pageW = doc.internal.pageSize.getWidth();

            doc.setFontSize(18); doc.setTextColor(...green); doc.setFont('helvetica', 'bold');
            doc.text('ALFARUQ ONLINE COURSE', pageW / 2, 22, { align: 'center' });
            doc.setFontSize(11); doc.setTextColor(80, 80, 80); doc.setFont('helvetica', 'normal');
            doc.text('Laporan Hasil Belajar', pageW / 2, 30, { align: 'center' });
            doc.setDrawColor(...green); doc.setLineWidth(0.5); doc.line(14, 34, pageW - 14, 34);
            doc.setFontSize(10); doc.setTextColor(50, 50, 50);
            doc.text('Nama    : ' + (currentUser.name || '-'), 14, 42);
            doc.text('Tanggal : ' + new Date().toLocaleDateString('id-ID'), 14, 48);

            // Fetch practical scores too
            const { data: practicalScores } = await supabaseClient
                .from('practical_scores')
                .select('*')
                .eq('user_id', currentUser.id);
            const practicalList = practicalScores || [];

            // Build table rows merging quiz scores + practical scores per lesson
            const allLessons = [];
            for (const course of coursesData) {
                if (!currentUser.scores.some(s => s.course_id === course.id)) continue;
                const courseQuizScores = currentUser.scores.filter(s => s.course_id === course.id);
                const coursePracticalScores = practicalList.filter(s => s.course_id === course.id);
                const lessonIds = [...new Set([
                    ...courseQuizScores.map(s => s.lesson_id),
                    ...coursePracticalScores.map(s => s.lesson_id)
                ])];
                for (const lessonId of lessonIds) {
                    const lesson = course?.lessons[lessonId];
                    const quiz = courseQuizScores.find(s => s.lesson_id === lessonId);
                    const practical = coursePracticalScores.find(s => s.lesson_id === lessonId);
                    allLessons.push([
                        course?.title || '-',
                        lesson?.title || `Materi ${lessonId + 1}`,
                        quiz?.quiz_score != null ? String(quiz.quiz_score) : '-',
                        practical?.score != null ? String(practical.score) : '-'
                    ]);
                }
            }
            const tableRows = allLessons.length > 0 ? allLessons : [['Belum ada nilai', '', '', '']];

            doc.autoTable({
                startY: 55,
                head: [['Kursus', 'Materi', 'Nilai Quiz', 'Nilai Praktik']],
                body: tableRows,
                headStyles: { fillColor: green, textColor: 255, fontStyle: 'bold', fontSize: 10 },
                bodyStyles: { fontSize: 9, textColor: [50, 50, 50] },
                alternateRowStyles: { fillColor: [245, 250, 247] },
                columnStyles: {
                    0: { cellWidth: 55 },
                    1: { cellWidth: 75 },
                    2: { cellWidth: 30, halign: 'center' },
                    3: { cellWidth: 30, halign: 'center' }
                },
                margin: { left: 14, right: 14 }
            });

            const finalY = doc.lastAutoTable.finalY + 10;
            doc.setFontSize(8); doc.setTextColor(160, 160, 160);
            doc.text('Dicetak oleh sistem ALFARUQ ONLINE COURSE', pageW / 2, finalY, { align: 'center' });
            doc.save('Rapor_' + (currentUser.name || 'Peserta').replace(/\s+/g, '_') + '.pdf');
        } catch (err) {
            console.error('PDF error:', err);
            alert('Gagal membuat PDF: ' + err.message);
        } finally {
            btn.disabled = false;
            btn.textContent = "Download Rapor PDF";
        }
    };
}

        if (amount > currentUser.walletBalance) {
            alert(`Saldo tidak cukup! Saldo: ${formatRupiah(currentUser.walletBalance)}`);
            return;
        }
        
        let todayTotalCheck = await getTodayTransferTotal();
        if (todayTotalCheck + amount > dailyLimit) {
            alert(`⚠️ Melebihi limit transfer harian ${formatRupiah(dailyLimit)}!`);
            return;
        }
        
        if (!confirm(`Konfirmasi transfer:\n\nKepada: ${selectedUser.full_name}\nJumlah: ${formatRupiah(amount)}\nCatatan: ${note || '-'}\n\nLanjutkan?`)) return;
        
        let btn = document.getElementById("transferBtn");
        let originalText = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = "Memproses...";
        
        // Kurangi saldo pengirim
        let newSenderBalance = currentUser.walletBalance - amount;
        let { error: senderError } = await supabaseClient
            .from('profiles')
            .update({ wallet_balance: newSenderBalance })
            .eq('user_id', currentUser.id);
        
        if (senderError) {
            alert("❌ Gagal: " + senderError.message);
            btn.disabled = false;
            btn.innerHTML = originalText;
            return;
        }
        
        // Tambah saldo penerima
        let { data: receiver } = await supabaseClient
            .from('profiles')
            .select('wallet_balance')
            .eq('user_id', selectedUser.user_id)
            .single();
        
        let newReceiverBalance = (receiver?.wallet_balance || 0) + amount;
        let { error: receiverError } = await supabaseClient
            .from('profiles')
            .update({ wallet_balance: newReceiverBalance })
            .eq('user_id', selectedUser.user_id);
        
        if (receiverError) {
            // Rollback
            await supabaseClient.from('profiles').update({ wallet_balance: currentUser.walletBalance }).eq('user_id', currentUser.id);
            alert("❌ Gagal: " + receiverError.message);
            btn.disabled = false;
            btn.innerHTML = originalText;
            return;
        }
        
        // Catat transaksi
        await supabaseClient.from('transfer_logs').insert({
            from_user_id: currentUser.id,
            from_user_name: currentUser.name,
            to_user_id: selectedUser.user_id,
            to_user_name: selectedUser.full_name,
            amount: amount,
            note: note,
            status: 'success',
            created_at: new Date().toISOString()
        });
        
        currentUser.walletBalance = newSenderBalance;
        alert(`✅ Transfer ${formatRupiah(amount)} berhasil dikirim ke ${selectedUser.full_name}!`);
        renderTransferPage();
    };
}

async function getTodayTransferTotal() {
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const { data } = await supabaseClient
        .from('transfer_logs')
        .select('amount')
        .eq('from_user_id', currentUser.id)
        .gte('created_at', today.toISOString());
    return (data || []).reduce((sum, t) => sum + t.amount, 0);
}

    const { data } = await supabaseClient
        .from('transfer_logs')

        .or(`from_user_id.eq.${currentUser.id},to_user_id.eq.${currentUser.id}`)
        .order('created_at', { ascending: false })

    const container = document.getElementById("transferHistory");

}

                    lessonSelect.innerHTML += `<option value="${idx}">${idx+1}. ${lesson.title}</option>`;
                });
                lessonGroup.style.display = "block";
            }
        } else {
            lessonGroup.style.display = "none";
        }
    };
    
    // Event untuk pilih materi
    document.getElementById("practicalLessonId").onchange = () => {
        const scoreGroup = document.getElementById("practicalScoreGroup");
        const notesGroup = document.getElementById("practicalNotesGroup");
        const saveBtn = document.getElementById("savePracticalBtn");
        
        if (document.getElementById("practicalLessonId").value) {
            scoreGroup.style.display = "block";
            notesGroup.style.display = "block";
            saveBtn.style.display = "block";
        } else {
            scoreGroup.style.display = "none";
            notesGroup.style.display = "none";
            saveBtn.style.display = "none";
        }
    };
    
    // Load daftar nilai praktik
    await loadPracticalScoresList();
    
    // Submit form
    document.getElementById("practicalForm").onsubmit = async (e) => {
        e.preventDefault();
        
        const userId = document.getElementById("practicalUserId").value;
        const courseId = parseInt(document.getElementById("practicalCourseId").value);
        const lessonId = parseInt(document.getElementById("practicalLessonId").value);
        const score = parseInt(document.getElementById("practicalScore").value);
        const notes = document.getElementById("practicalNotes").value;
        
        if (!userId || !courseId || isNaN(lessonId) || score === '' || isNaN(score)) {
            alert("Lengkapi semua data!");
            return;
        }
        
        const { error } = await supabaseClient
            .from('practical_scores')
            .upsert({
                user_id: userId,
                course_id: courseId,
                lesson_id: lessonId,
                score: score,
                notes: notes
            }, { onConflict: 'user_id,course_id,lesson_id' });
        
        if (error) {
            alert("❌ Gagal: " + error.message);
        } else {
            alert("✅ Nilai praktik berhasil disimpan!");
            await loadPracticalScoresList();
            
            // Reset form
            document.getElementById("practicalUserId").value = "";
            document.getElementById("practicalCourseId").value = "";
            document.getElementById("practicalLessonId").value = "";
            document.getElementById("practicalLessonGroup").style.display = "none";
            document.getElementById("practicalScore").value = "";
            document.getElementById("practicalNotes").value = "";
            document.getElementById("practicalScoreGroup").style.display = "none";
            document.getElementById("practicalNotesGroup").style.display = "none";
            document.getElementById("savePracticalBtn").style.display = "none";
        }
    };
}

async function loadPracticalScoresList() {
    const container = document.getElementById("practicalList");
    if (!container) return;
    
    try {
        // Ambil data nilai praktik
        const { data: scores, error } = await supabaseClient
            .from('practical_scores')
            .select('*')
            .order('created_at', { ascending: false });
        
        if (error) {
            console.error("Error:", error);
            container.innerHTML = '<div class="alert-danger">Gagal memuat data: ' + error.message + '</div>';
            return;
        }
        
        if (!scores || scores.length === 0) {
            container.innerHTML = '<div class="alert-info">Belum ada nilai praktik.</div>';
            return;
        }
        
        let html = `
            <table class="report-table">
                <thead>
                    <tr style="background:#1e6b3b; color:white;">
                        <th>Peserta</th>
                        <th>Kursus</th>
                        <th>Materi</th>
                        <th>Nilai</th>
                        <th>Catatan</th>
                        <th>Tanggal</th>
                    </tr>
                </thead>
                <tbody>
        `;
        
        for (const s of scores) {
            // Ambil nama user
            let userName = s.user_id;
            const { data: userData } = await supabaseClient
                .from('profiles')
                .select('full_name')
                .eq('user_id', s.user_id)
                .single();
            
            if (userData && userData.full_name) {
                userName = userData.full_name;
            }
            
            const course = coursesData.find(c => c.id === s.course_id);
            const lesson = course?.lessons[s.lesson_id];
            const courseTitle = course?.title || '-';
            const lessonTitle = lesson?.title || `Materi ${(s.lesson_id || 0) + 1}`;
            
            html += `
                <tr>
                    <td>${escapeHtml(userName)}</td>
                    <td>${escapeHtml(courseTitle)}</td>
                    <td>${escapeHtml(lessonTitle)}</td>
                    <td style="color:${s.score >= 70 ? '#27ae60' : '#e74c3c'}; font-weight:bold;">${s.score}/100</td>
                    <td>${escapeHtml(s.notes || '-')}</td>
                    <td>${new Date(s.created_at).toLocaleDateString('id-ID')}</td>
                </tr>
            `;
        }
        
        html += `</tbody></table>`;
        container.innerHTML = html;
        
    } catch (err) {
        console.error("Error:", err);
        container.innerHTML = '<div class="alert-danger">Error: ' + err.message + '</div>';
    }
}

async function renderPPOBMarkupSettings() {
    let html = `<div class="card"><h2>Pengaturan Markup PPOB</h2><div class="alert-info">Atur markup (keuntungan) untuk setiap produk PPOB.</div>
        <form id="markupForm"><table class="report-table"><thead><tr><th>Kategori</th><th>Produk</th><th>Harga Dasar</th><th>Markup (Rp)</th><th>Harga Jual</th></tr></thead>
        <tbody>${Object.entries(PPOB_PRODUCTS).map(([cat, products]) => products.map(p => `<tr><td>${cat}</td><td>${p.name}</td><td>${formatRupiah(p.basePrice)}</td>
        <td><input type="number" name="markup_${cat}_${p.sku}" value="${p.markup}" min="0" step="500" style="width:100px;"></td>
        <td class="price_${cat}_${p.sku}">${formatRupiah(p.basePrice + p.markup)}</td></tr>`).join('')).join('')}</tbody></table>
        <button type="submit" class="btn-success">Simpan Semua Markup</button><button type="button" id="backBtn" class="btn-back">Kembali</button></form></div>`;
    document.getElementById("adminContent").innerHTML = html;
    Object.entries(PPOB_PRODUCTS).forEach(([cat, products]) => { products.forEach(p => { let inp = document.querySelector(`input[name="markup_${cat}_${p.sku}"]`); if(inp) inp.addEventListener('input', (e) => { let markup = parseInt(e.target.value) || 0; let span = document.querySelector(`.price_${cat}_${p.sku}`); if(span) span.innerHTML = formatRupiah(p.basePrice + markup); }); }); });
    document.getElementById("backBtn").onclick = () => renderAdminDashboard();
    document.getElementById("markupForm").onsubmit = async (e) => {
        e.preventDefault(); let updated = false;
        Object.entries(PPOB_PRODUCTS).forEach(([cat, products]) => { products.forEach(p => { let inp = document.querySelector(`input[name="markup_${cat}_${p.sku}"]`); if(inp) { let newMarkup = parseInt(inp.value); if(!isNaN(newMarkup) && newMarkup !== p.markup) { p.markup = newMarkup; updated = true; } } }); });
        alert(updated ? "✅ Markup PPOB berhasil disimpan!" : "Tidak ada perubahan"); if(updated) renderPPOBMarkupSettings();
    };
}

// ======================== ROUTING ========================
async function route() {
    let hash = window.location.hash.slice(1);
    if (!supabaseClient) { showLoading(); let success = await initSupabase(); if (!success) return; }
    if (hash === "" || hash === "landing") renderLandingPage();
    else if (hash === "register") renderRegisterForm(false);
    else if (hash === "register-bundle") renderRegisterForm(true);
    else if (hash === "login") renderLoginForm();
    else if (hash === "forgot-password") renderForgotPassword();
    else if (hash === "dashboard") { if (currentUser) renderUserDashboard(); else window.location.hash = "#login"; }
    else if (hash === "admin") renderAdminLogin();
    else if (hash === "admin-dashboard") { if (isAdmin) renderAdminDashboard(); else { alert("Akses ditolak"); window.location.hash = "#landing"; } }
    else renderLandingPage();
}

// ======================== INIT ========================
window.addEventListener("hashchange", route);
let saved = localStorage.getItem("darkMode");
if (saved === "true") document.documentElement.setAttribute("data-theme", "dark");
route();
</script>
